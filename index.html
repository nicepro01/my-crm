
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root{
  --bg:#f5f5f7;--sf:#fff;--s2:rgba(255,255,255,.88);--s3:#f5f5f7;--s4:#e8e8ed;
  --bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.14);
  --t1:#1d1d1f;--t2:#6e6e73;--t3:#aeaeb2;
  --ac:#0071e3;--ac2:#0077ed;--abg:rgba(0,113,227,.1);
  --gn:#34c759;--gbg:rgba(52,199,89,.12);--gt:#1a7a31;
  --rd:#ff3b30;--rbg:rgba(255,59,48,.1);--rt:#c0392b;
  --or:#ff9500;--obg:rgba(255,149,0,.1);--ot:#7a4800;
  --pu:#af52de;--pbg:rgba(175,82,222,.1);--pt:#7b2da8;
  --pk:#ff2d55;--pkbg:rgba(255,45,85,.1);
  --ss:0 1px 3px rgba(0,0,0,.06);--sm:0 4px 16px rgba(0,0,0,.08);--sl:0 12px 40px rgba(0,0,0,.12);
  --r:12px;--rs:8px;--rl:16px;
}
.dark{
  --bg:#000;--sf:#1c1c1e;--s2:rgba(28,28,30,.92);--s3:#2c2c2e;--s4:#3a3a3c;
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.15);
  --t1:#f5f5f7;--t2:#98989d;--t3:#48484a;
  --ac:#0a84ff;--ac2:#0a84ff;--abg:rgba(10,132,255,.15);
  --gn:#30d158;--gbg:rgba(48,209,88,.15);--gt:#30d158;
  --rd:#ff453a;--rbg:rgba(255,69,58,.15);--rt:#ff453a;
  --or:#ff9f0a;--obg:rgba(255,159,10,.15);--ot:#ff9f0a;
  --pu:#bf5af2;--pbg:rgba(191,90,242,.15);--pt:#bf5af2;
  --ss:0 1px 4px rgba(0,0,0,.4);--sm:0 4px 20px rgba(0,0,0,.5);--sl:0 16px 50px rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--t1);background:var(--bg);font-size:15px;line-height:1.4;min-height:600px}
.screen{display:none;flex-direction:column;min-height:600px;background:var(--bg)}
.screen.active{display:flex}

.tb{display:flex;align-items:center;gap:8px;padding:13px 16px 11px;background:var(--s2);border-bottom:.5px solid var(--bd);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:50;flex-shrink:0}
.tb-back{background:none;border:none;cursor:pointer;color:var(--ac);font-size:17px;font-weight:500;padding:4px 6px;border-radius:8px}
.tb-back:hover{background:var(--abg)}
.tb-badge{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.bg-life{background:linear-gradient(135deg,#ff6b9d,#ff2d55)}
.bg-work{background:linear-gradient(135deg,#34aadc,#0071e3)}
.bg-proj{background:linear-gradient(135deg,#5ac8fa,#007aff)}
.bg-order{background:linear-gradient(135deg,#af52de,#5856d6)}
.bg-client{background:linear-gradient(135deg,#30d158,#34c759)}
.bg-home{background:linear-gradient(135deg,#636366,#48484a)}
.tb-title{font-size:17px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.3px}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--t2);width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.icon-btn:hover{background:var(--s3)}
.tabs-bar{background:var(--s2);border-bottom:.5px solid var(--bd);padding:0 16px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;backdrop-filter:blur(20px)}
.tabs-bar::-webkit-scrollbar{display:none}
.tabs{display:flex}
.tab{padding:10px 13px;font-size:13px;font-weight:500;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;min-height:44px;display:flex;align-items:center;gap:5px;transition:color .15s}
.tab:hover{color:var(--t1)}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 16px;display:flex;flex-direction:column;gap:14px}

.card{background:var(--sf);border-radius:var(--rl);box-shadow:var(--ss);border:.5px solid var(--bd);overflow:hidden}
.cs{padding:13px 15px;border-bottom:.5px solid var(--bd)}
.cs:last-child{border-bottom:none}
.cs-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.cs-title{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.fr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:.5px solid var(--bd);gap:12px;font-size:14px}
.fr:last-child{border-bottom:none}
.fl{color:var(--t2)}.fv{font-weight:500;text-align:right;word-break:break-word}

.pb{padding:7px 14px;font-size:13px;font-weight:500;border-radius:20px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.pb:active{transform:scale(.96)}
.pb-p{background:var(--ac);color:#fff}.pb-p:hover{background:var(--ac2)}
.pb-s{background:var(--s3);color:var(--t1)}.pb-s:hover{background:var(--s4)}
.pb-g{background:var(--gn);color:#fff}
.pb-r{background:var(--rbg);color:var(--rt)}
.pb-sm{padding:5px 11px;font-size:12px}

/* HOME */
.folders{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
@media(max-width:400px){.folders{grid-template-columns:1fr}}
.fc{background:var(--sf);border-radius:var(--rl);box-shadow:var(--sm);border:.5px solid var(--bd);padding:16px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:9px;transition:all .18s;text-align:center}
.fc:hover{transform:translateY(-2px);box-shadow:var(--sl)}
.fc:active{transform:scale(.97)}
.fi{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px}
.fi-life{background:linear-gradient(135deg,#ff6b9d,#ff2d55)}
.fi-work{background:linear-gradient(135deg,#34aadc,#0071e3)}
.fi-proj{background:linear-gradient(135deg,#5ac8fa,#007aff)}
.fn{font-size:13px;font-weight:600}
.fct{font-size:11px;color:var(--t2);display:flex;justify-content:space-between;width:100%}
.fcn{font-weight:600;color:var(--t1)}

/* CALENDAR */
.cal{background:var(--sf);border-radius:var(--rl);box-shadow:var(--ss);border:.5px solid var(--bd);overflow:hidden}
.cal-top{display:flex;align-items:center;gap:8px;padding:13px 14px 10px;flex-wrap:wrap}
.cal-month{font-size:17px;font-weight:600;flex:1;letter-spacing:-.4px;min-width:120px}
.cal-seg{display:flex;background:var(--s3);border-radius:8px;padding:2px}
.cal-seg-btn{padding:5px 10px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;border-radius:6px;color:var(--t2)}
.cal-seg-btn.active{background:var(--sf);color:var(--t1);box-shadow:var(--ss)}
.cal-filters{display:flex;gap:3px;flex-wrap:wrap}
.cal-fb{padding:4px 9px;font-size:11px;font-weight:500;border-radius:20px;border:none;cursor:pointer}
.cal-nav{display:flex;gap:2px}
.cal-nav-b{width:32px;height:32px;border:none;background:none;cursor:pointer;color:var(--ac);font-size:15px;font-weight:600;border-radius:8px;display:flex;align-items:center;justify-content:center}
.cal-nav-b:hover{background:var(--abg)}
.cal-dows{display:grid;grid-template-columns:repeat(7,1fr);border-top:.5px solid var(--bd)}
.cal-dow{padding:5px 2px;text-align:center;font-size:11px;font-weight:600;color:var(--t3)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{min-height:60px;padding:3px;border-right:.5px solid var(--bd);border-top:.5px solid var(--bd);cursor:pointer;background:var(--sf)}
.cal-day:nth-child(7n){border-right:none}
.cal-day:hover{background:var(--s3)}
.cal-day.sel-day{background:var(--abg)}
.cal-day.om .dn{color:var(--t3)}
.dn{font-size:12px;font-weight:500;width:24px;height:24px;display:flex;align-items:center;justify-content:center;margin-bottom:2px;border-radius:50%}
.cal-day.today-day .dn{background:var(--ac);color:#fff;font-weight:700}
.cal-ev{font-size:10px;padding:2px 4px;border-radius:4px;margin-bottom:1px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:none;text-align:left;width:100%;display:block;font-weight:500}
.ev-life{background:rgba(255,45,85,.12);color:#c0183a}
.ev-work{background:var(--abg);color:var(--ac)}
.ev-proj{background:var(--pbg);color:var(--pt)}
.ev-del{background:var(--gbg);color:var(--gt)}
.more-l{font-size:10px;color:var(--t2);background:none;border:none;cursor:pointer;padding:1px 3px;display:block;font-weight:500}
.week-wrap{overflow-x:auto}
.week-hdr{display:grid;grid-template-columns:40px repeat(7,1fr);border-top:.5px solid var(--bd)}
.week-hdr-cell{padding:6px 3px;text-align:center;font-size:11px;font-weight:600;color:var(--t2);border-bottom:.5px solid var(--bd);border-right:.5px solid var(--bd)}
.week-hdr-cell:last-child{border-right:none}
.week-hdr-cell.today-col{color:var(--ac)}
.week-body{overflow-y:auto;max-height:280px}
.week-row{display:grid;grid-template-columns:40px repeat(7,1fr)}
.week-time{font-size:10px;color:var(--t3);padding:2px 4px;text-align:right;border-right:.5px solid var(--bd);border-bottom:.5px solid var(--bd);height:38px;display:flex;align-items:flex-start;justify-content:flex-end;padding-top:3px}
.week-cell{border-right:.5px solid var(--bd);border-bottom:.5px solid var(--bd);height:38px;position:relative;padding:1px}
.week-cell:last-child{border-right:none}
.week-ev-chip{position:absolute;left:1px;right:1px;top:2px;font-size:9px;padding:2px 3px;border-radius:3px;overflow:hidden;cursor:pointer;font-weight:500;white-space:nowrap;border:none;text-align:left}
.day-body{overflow-y:auto;max-height:280px}
.day-row{display:grid;grid-template-columns:40px 1fr}
.day-time{font-size:10px;color:var(--t3);padding:2px 5px;text-align:right;border-right:.5px solid var(--bd);border-bottom:.5px solid var(--bd);height:44px;display:flex;align-items:flex-start;justify-content:flex-end;padding-top:3px}
.day-slot{border-bottom:.5px solid var(--bd);height:44px;position:relative;padding:2px 4px}
.day-slot-ev{position:absolute;left:4px;right:4px;top:2px;font-size:11px;padding:2px 6px;border-radius:4px;border:none;cursor:pointer;font-weight:500;background:var(--abg);color:var(--ac);text-align:left;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;width:calc(100% - 8px)}
.dp{padding:13px 15px;border-top:.5px solid var(--bd)}
.dp-head{font-size:15px;font-weight:600;margin-bottom:10px;letter-spacing:-.2px}
.dp-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);margin-bottom:6px;cursor:pointer;border:.5px solid var(--bd);background:var(--sf);min-height:48px;box-shadow:var(--ss);transition:all .15s}
.dp-item:hover{box-shadow:var(--sm);transform:translateX(2px)}
.dp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dp-info{flex:1;min-width:0}
.dp-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dp-name.done{text-decoration:line-through;color:var(--t3)}
.dp-time{font-size:12px;color:var(--t2);margin-top:1px}
.dp-empty{font-size:13px;color:var(--t3);padding:6px 0}

/* TASKS */
.ti{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--sf);border-radius:var(--rs);margin-bottom:6px;border:.5px solid var(--bd);min-height:52px;box-shadow:var(--ss);transition:all .15s}
.ti:hover{box-shadow:var(--sm)}
.cb{width:20px;height:20px;border:1.5px solid var(--bd2);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--sf)}
.cb.done{background:var(--ac);border-color:var(--ac);color:#fff}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* CONTACTS */
.cr{display:flex;align-items:center;gap:11px;padding:12px 15px;border-bottom:.5px solid var(--bd);cursor:pointer;min-height:56px;transition:background .15s}
.cr:hover{background:var(--s3)}
.cr:last-child{border-bottom:none}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.av0{background:linear-gradient(135deg,#34aadc,#0071e3);color:#fff}
.av1{background:linear-gradient(135deg,#30d158,#34c759);color:#fff}
.av2{background:linear-gradient(135deg,#ffcc02,#ff9500);color:#fff}
.av3{background:linear-gradient(135deg,#ff6b9d,#ff2d55);color:#fff}
.av4{background:linear-gradient(135deg,#bf5af2,#af52de);color:#fff}
.av5{background:linear-gradient(135deg,#5ac8fa,#007aff);color:#fff}

/* KANBAN */
.kb-outer{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -16px;padding:0 16px}
.kb{display:flex;gap:9px;padding-bottom:6px;min-width:max-content}
.kc{width:160px;flex-shrink:0;border-radius:var(--r);background:var(--s3);border:.5px solid var(--bd);padding:9px;transition:background .2s}
.kc.drag-over{background:var(--abg);border-color:var(--ac)}
.kc-convert{border-style:dashed;border-color:var(--gn);background:var(--gbg)}
.kc-convert.drag-over{background:rgba(52,199,89,.25)}
.kc-fail{border-style:dashed;border-color:var(--rd);background:var(--rbg)}
.kc-fail.drag-over{background:rgba(255,59,48,.2)}
.kc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.kc-name{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.4px}
.kc-cnt{font-size:11px;background:var(--sf);border:.5px solid var(--bd);border-radius:20px;padding:1px 7px;font-weight:500}
.kcard{background:var(--sf);border:.5px solid var(--bd);border-radius:var(--rs);padding:9px;margin-bottom:5px;cursor:grab;box-shadow:var(--ss);transition:all .2s;user-select:none;-webkit-user-select:none}
.kcard:hover{box-shadow:var(--sm);transform:translateY(-1px)}
.kcard.dragging{opacity:.45;transform:rotate(2deg) scale(1.04);cursor:grabbing}
.kcard-failed{background:var(--rbg);border:.5px dashed var(--rd);border-radius:var(--rs);padding:8px;margin-bottom:5px;font-size:11px;color:var(--rt)}
.kcard-name{font-size:12px;font-weight:600;margin-bottom:4px}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.t-hot{background:var(--rbg);color:var(--rt)}.t-warm{background:var(--obg);color:var(--ot)}
.t-cold{background:var(--abg);color:var(--ac)}.t-neutral{background:var(--s3);color:var(--t2)}
.t-done{background:var(--gbg);color:var(--gt)}.t-pending{background:var(--s3);color:var(--t2)}
.t-cargo{background:var(--obg);color:var(--ot)}.t-white{background:var(--abg);color:var(--ac)}
.t-search{background:var(--obg);color:var(--ot)}.t-buyout{background:var(--pbg);color:var(--pt)}
.t-warn{background:var(--rbg);color:var(--rt)}

/* STAGE BAR */
.sb{display:flex;gap:3px;flex-wrap:wrap}
.ss{flex:1;min-width:55px;padding:7px 3px;border-radius:var(--rs);border:.5px solid var(--bd);text-align:center;font-size:9px;font-weight:500;color:var(--t2);cursor:pointer;background:var(--s3);min-height:34px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ss:hover{border-color:var(--bd2)}
.ss.sact{background:var(--ac);border-color:var(--ac);color:#fff}
.ss.sdone{background:var(--gbg);border-color:var(--gn);color:var(--gt)}
.ss.swarn{background:var(--rbg);border-color:var(--rd);color:var(--rt)}
.ss.sfail{background:var(--rbg);border-color:var(--rd);color:var(--rt)}

/* PAYMENT */
.pg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.pi{background:var(--s3);border-radius:var(--rs);padding:10px 11px;border:.5px solid var(--bd)}
.pl{font-size:10px;color:var(--t2);margin-bottom:3px;font-weight:500}
.pv{font-size:14px;font-weight:600}
.ps{font-size:10px;color:var(--t3);margin-top:2px}
.bk{background:var(--s3);border-radius:var(--rs);padding:9px 11px;border:.5px solid var(--bd)}
.br{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:.5px solid var(--bd);gap:8px}
.br:last-child{border-bottom:none}
.brl{color:var(--t2)}.brv{font-weight:600}
.gv{color:var(--gt)}.rv{color:var(--rt)}
.drow{display:flex;align-items:center;gap:8px;padding:7px 0;font-size:14px;border-bottom:.5px solid var(--bd)}
.drow:last-child{border-bottom:none}
.dl{color:var(--t2);flex:1}.dv{font-weight:500;text-align:right}

/* COMMENTS */
.comment{display:flex;gap:9px;padding:9px 0;border-bottom:.5px solid var(--bd)}
.comment:last-child{border-bottom:none}
.cav{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#34aadc,#0071e3);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.cmeta{font-size:11px;color:var(--t3);margin-bottom:3px}
.ctext{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.hidden{display:none!important}
.sort-item{cursor:grab;transition:opacity .15s}
.sort-item:active{cursor:grabbing}
.sort-item.dragging{opacity:.35}
.cinput{display:flex;gap:7px;margin-top:9px}
.cinput textarea{flex:1;font-size:14px;padding:9px 11px;border:.5px solid var(--bd2);border-radius:var(--rs);background:var(--sf);color:var(--t1);resize:none;height:40px;font-family:inherit}
.cinput textarea:focus{outline:none;border-color:var(--ac)}

/* NOTES */
.note{background:var(--sf);border:.5px solid var(--bd);border-radius:var(--r);padding:13px;margin-bottom:9px;box-shadow:var(--ss)}
.ndate{font-size:11px;color:var(--t3);margin-bottom:5px;font-weight:500}
.ntext{font-size:14px;line-height:1.6;white-space:pre-wrap}

/* SHOPPING */
.shop-item{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:.5px solid var(--bd);min-height:50px}
.shop-item:hover{background:var(--s3)}
.shop-item:last-child{border-bottom:none}
.shop-cb{width:22px;height:22px;border:1.5px solid var(--bd2);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.shop-cb.bought{background:var(--gn);border-color:var(--gn);color:#fff}
.shop-cat{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;flex-shrink:0}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
@media(min-width:460px){.stats{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--sf);border-radius:var(--r);box-shadow:var(--ss);padding:13px;border:.5px solid var(--bd)}
.stat-l{font-size:11px;color:var(--t2);margin-bottom:3px;font-weight:500}
.stat-v{font-size:22px;font-weight:700;letter-spacing:-.5px}
.stat-s{font-size:11px;color:var(--t3);margin-top:2px}

/* CONTENT PLAN */
.cp-card{background:var(--sf);border:.5px solid var(--bd);border-radius:var(--rs);padding:10px;margin-bottom:6px;cursor:pointer;box-shadow:var(--ss);transition:all .2s}
.cp-card:hover{box-shadow:var(--sm);transform:translateY(-1px)}
.cp-card.dragging{opacity:.4;transform:rotate(2deg);cursor:grabbing}
.cp-platform{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}
.cp-type{font-size:10px;color:var(--t2);margin-top:2px}
.cp-date{font-size:10px;color:var(--t3);margin-top:3px}
.cp-kc{width:155px}

/* PROJECT KANBAN */
.proj-board-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:.5px solid var(--bd)}
.proj-col-add{width:155px;flex-shrink:0;border-radius:var(--r);border:1.5px dashed var(--bd2);padding:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);font-size:13px;font-weight:500;min-height:80px;transition:all .15s}
.proj-col-add:hover{border-color:var(--ac);color:var(--ac)}

/* ANALYTICS CLIENT */
.anal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:460px){.anal-grid{grid-template-columns:repeat(3,1fr)}}

async function uploadToCloudinary(file){
  const fd=new FormData();
  fd.append('file',file);
  fd.append('upload_preset',CLD_PRESET);
  fd.append('folder','crm');
  const r=await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/image/upload`,{method:'POST',body:fd});
  const d=await r.json();
  if(d.secure_url)return d.secure_url;
  throw new Error(d.error?.message||'Upload failed');
}

function makePhotoUploader(inputId, previewId, urlStore){
  const inp=document.getElementById(inputId);
  if(!inp)return;
  inp.addEventListener('change',async e=>{
    const file=e.target.files[0];
    if(!file)return;
    const prev=document.getElementById(previewId);
    if(prev){prev.src='';prev.style.display='none';}
    showToast('⬆️ Загружаю фото...');
    try{
      const url=await uploadToCloudinary(file);
      urlStore(url);
      if(prev){prev.src=url;prev.style.display='block';}
      showToast('✅ Фото загружено!');
    }catch(e){
      showToast('❌ Ошибка загрузки');
      console.error(e);
    }
  });
}

let _sb = null;
let _saveTimer = null;
let _syncIndicator = null;

function initSupabase() {
  if (!SUPABASE_URL.startsWith('http')) return; // ключи не вставлены
  _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  // индикатор синхронизации
  _syncIndicator = document.createElement('div');
  _syncIndicator.id = 'sync-indicator';
  _syncIndicator.style.cssText = 'position:fixed;top:10px;right:12px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none';
  document.body.appendChild(_syncIndicator);
}

function showSync(state) {
  if (!_syncIndicator) return;
  const styles = {
    saving: 'background:rgba(255,149,0,.15);color:#7a4800;opacity:1',
    ok:     'background:rgba(52,199,89,.15);color:#1a7a31;opacity:1',
    error:  'background:rgba(255,59,48,.12);color:#c0392b;opacity:1',
    hide:   'opacity:0'
  };
  const labels = { saving: '⟳ Сохранение...', ok: '✓ Сохранено', error: '⚠ Ошибка синхр.' };
  _syncIndicator.style.cssText = _syncIndicator.style.cssText.replace(/background[^;]+;color[^;]+;opacity[^;]+/, '').trim();
  Object.assign(_syncIndicator.style, Object.fromEntries(styles[state].split(';').map(s => s.split(':'))));
  _syncIndicator.style.cssText = _syncIndicator.style.cssText + ';' + styles[state];
  _syncIndicator.textContent = labels[state] || '';
  if (state === 'ok') setTimeout(() => { if (_syncIndicator) _syncIndicator.style.opacity = '0'; }, 2000);
}

async function loadFromSupabase() {
  if (!_sb) return false;
  try {
    const { data, error } = await _sb.from('crm_data').select('payload').eq('id', DB_ROW_ID).single();
    if (error && error.code !== 'PGRST116') throw error;
    if (data && data.payload) {
      // Мержим загруженные данные в db
      const saved = data.payload;
      Object.assign(db, saved);
      return true;
    }
  } catch(e) { console.warn('Supabase load error:', e); }
  return false;
}

async function saveToSupabase() {
  if (!_sb) return;
  showSync('saving');
  try {
    const { error } = await _sb.from('crm_data').upsert({ id: DB_ROW_ID, payload: db, updated_at: new Date().toISOString() });
    if (error) throw error;
    showSync('ok');
  } catch(e) {
    console.warn('Supabase save error:', e);
    showSync('error');
  }
}

// Вызывай saveDB() после каждого изменения db — уже встроено ниже
function saveDB() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveToSupabase, 800); // debounce 0.8s
}

// ── EVENTS ─────────────────────────────────────────────
function getEvs(folders){
  const evs=[];
  (folders||['life','projects','work']).forEach(f=>{
    const tasks=f==='work'?db.work.tasks:(db[f]?.tasks||[]);
    tasks.forEach(t=>{if(t.due)evs.push({date:t.due,time:t.time||'',name:t.name,folder:f,taskId:t.id,done:t.done,priority:t.priority,type:'task'});});
    // Lead tasks
    if(f==='work'){
      db.work.leads.forEach(l=>{
        if(!l.tasks)return;
        l.tasks.forEach((t,i)=>{
          if(t.date&&!t.done)evs.push({date:t.date,time:t.time||'',name:`🎯 ${l.name}: ${t.text}`,folder:'work',type:'lead_task',leadId:l.id,taskIdx:i,done:t.done,priority:'high'});
        });
      });
    }
    if(f==='work'){
      db.work.clients.forEach(c=>{c.orders.forEach(o=>{if(o.delivery.arrDate&&o.stage>=7&&o.stage<9)evs.push({date:o.delivery.arrDate,time:'',name:`📦 ${c.name}`,folder:'work',type:'delivery',clientId:c.id,orderId:o.id,isDelayed:daysDiff(o.delivery.arrDate)<0,priority:'high'});});});
      // Content plan scheduled posts
      db.work.content.filter(c=>c.stage===3&&c.date).forEach(c=>evs.push({date:c.date,time:'',name:`📱 ${c.title}`,folder:'work',type:'content',contentId:c.id,priority:'mid'}));
    }
  });
  return evs.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
}

// ── CALENDAR ───────────────────────────────────────────
function buildCal(opts){
  const{cY,cM,cV,cS,evs,filterBar,filterActive,filterFn,navFn,viewFn,dayFn,evFn}=opts;
  const today=toStr();
  const ebd={};evs.forEach(e=>{if(!ebd[e.date])ebd[e.date]=[];ebd[e.date].push(e);});
  const navH=`<div class="cal-nav"><button class="cal-nav-b" onclick="${navFn}(-1)">‹</button><button class="cal-nav-b" onclick="${navFn}(1)">›</button></div>`;
  const segH=`<div class="cal-seg"><button class="cal-seg-btn${cV==='month'?' active':''}" onclick="${viewFn}('month')">Мес</button><button class="cal-seg-btn${cV==='week'?' active':''}" onclick="${viewFn}('week')">Нед</button><button class="cal-seg-btn${cV==='day'?' active':''}" onclick="${viewFn}('day')">День</button></div>`;
  let fH='';
  if(filterBar){const fa=filterActive||'all';fH=`<div class="cal-filters">${[{k:'all',l:'Все'},{k:'life',l:'Жизнь'},{k:'work',l:'Работа'},{k:'projects',l:'Проекты'}].map(o=>`<button class="cal-fb" style="${fa===o.k?'background:var(--ac);color:#fff':'background:var(--s3);color:var(--t2)'}" onclick="${filterFn}('${o.k}')">${o.l}</button>`).join('')}</div>`;}
  const titleStr=cV==='day'?(()=>{const d=new Date(cS+'T00:00');return isNaN(d.getTime())?'День':`${d.getDate()} ${MONTHS[cM]}`;})():`${MONTHS[cM]} ${cY}`;
  const topH=`<div class="cal-top"><div class="cal-month">${titleStr}</div>${fH}${segH}${navH}</div>`;
  let gridH='';
  if(cV==='month'){
    const first=new Date(cY,cM,1);let sd=first.getDay();sd=(sd+6)%7;
    const dim=new Date(cY,cM+1,0).getDate(),dip=new Date(cY,cM,0).getDate();
    const cells=[];
    for(let i=0;i<sd;i++){const d=dip-sd+1+i;cells.push({d,m:'p',ds:`${cY}-${String(cM).padStart(2,'0')}-${String(d).padStart(2,'0')}`});}
    for(let d=1;d<=dim;d++){const ds=`${cY}-${String(cM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;cells.push({d,m:'c',ds});}
    let nx=1;while(cells.length%7)cells.push({d:nx++,m:'n',ds:'x'});
    const dowRow=`<div class="cal-dows">${DOWS.map(d=>`<div class="cal-dow">${d[0]}</div>`).join('')}</div>`;
    gridH=dowRow+`<div class="cal-grid">${cells.map(c=>{
      const isT=c.ds===today,isO=c.m!=='c',isSel=c.ds===cS,devs=ebd[c.ds]||[];
      const evH=devs.slice(0,2).map(e=>`<button class="cal-ev ev-${e.type==='delivery'||e.type==='content'?'del':e.folder==='projects'?'proj':e.folder}" onclick="event.stopPropagation();${evFn(e)}" title="${e.name}">${e.time?e.time+' ':''}${e.name}</button>`).join('');
      const moreH=devs.length>2?`<button class="more-l" onclick="event.stopPropagation();${dayFn}('${c.ds}')">+${devs.length-2}</button>`:'';
      return`<div class="cal-day${isO?' om':''}${isT?' today-day':''}${isSel?' sel-day':''}" onclick="${dayFn}('${c.ds}')"><div class="dn">${c.d}</div>${evH}${moreH}</div>`;
    }).join('')}</div>`;
  } else if(cV==='week'){
    const selD=new Date(cS+'T00:00');let ws=new Date(selD);ws.setDate(selD.getDate()-((selD.getDay()+6)%7));
    const days=Array.from({length:7},(_,i)=>{const dt=new Date(ws);dt.setDate(ws.getDate()+i);return dt;});
    const hdrCells=`<div class="week-hdr-cell"></div>${days.map(d=>{const ds=d.toISOString().slice(0,10);return`<div class="week-hdr-cell${ds===today?' today-col':''}">${DOWS[(d.getDay()+6)%7]} ${d.getDate()}</div>`;}).join('')}`;
    const rows=Array.from({length:24},(_,h)=>`<div class="week-row"><div class="week-time">${h}:00</div>${days.map(day=>{const ds=day.toISOString().slice(0,10);const devs=(ebd[ds]||[]).filter(e=>e.time&&parseInt(e.time)===h);return`<div class="week-cell">${devs.map(e=>`<button class="week-ev-chip ev-${e.folder==='projects'?'proj':e.folder}" onclick="${evFn(e)}">${e.name}</button>`).join('')}</div>`;}).join('')}</div>`).join('');
    gridH=`<div class="week-wrap"><div class="week-hdr">${hdrCells}</div><div class="week-body">${rows}</div></div>`;
  } else {
    const devs=(ebd[cS]||[]).sort((a,b)=>a.time&&b.time?a.time.localeCompare(b.time):a.time?-1:b.time?1:0);
    const rows=Array.from({length:24},(_,h)=>{const hEvs=devs.filter(e=>e.time&&parseInt(e.time)===h);return`<div class="day-row"><div class="day-time">${h}:00</div><div class="day-slot">${hEvs.map(e=>`<button class="day-slot-ev" onclick="${evFn(e)}">${e.time} ${e.name}</button>`).join('')}</div></div>`;}).join('');
    const noTime=devs.filter(e=>!e.time);
    gridH=`<div class="day-body">${rows}</div>${noTime.length?`<div style="padding:10px 14px;border-top:.5px solid var(--bd)"><div class="sl" style="margin-bottom:6px">Без времени</div>${noTime.map(e=>`<div class="dp-item" onclick="${evFn(e)}"><div class="dp-dot" style="background:${PC[e.priority]||'var(--ac)'}"></div><div class="dp-info"><div class="dp-name">${e.name}</div></div></div>`).join('')}</div>`:''}`;
  }
  return`<div class="cal">${topH}${gridH}</div>`;
}
function buildDP(cS,evs,evFn){
  const devs=(evs.filter(e=>e.date===cS)||[]).sort((a,b)=>a.time&&b.time?a.time.localeCompare(b.time):a.time?-1:b.time?1:0);
  const d=new Date(cS+'T00:00');const lbl=isNaN(d.getTime())?'Выбери день':`${d.getDate()} ${MONTHS[d.getMonth()]}`;
  if(!devs.length)return`<div class="dp"><div class="dp-head">${lbl}</div><div class="dp-empty">Нет событий</div></div>`;
  const tStyle=f=>f==='life'?'background:rgba(255,45,85,.12);color:#c0183a':f==='work'?'background:var(--abg);color:var(--ac)':'background:var(--pbg);color:var(--pt)';
  return`<div class="dp"><div class="dp-head">${lbl} — ${devs.length} событ${devs.length===1?'ие':devs.length<5?'ия':'ий'}</div>${devs.map(e=>{const isD=e.type==='delivery'||e.type==='content';return`<div class="dp-item" onclick="${evFn(e)}"><div class="dp-dot" style="background:${isD?'var(--gn)':PC[e.priority]}"></div><div class="dp-info"><div class="dp-name${e.done?' done':''}">${e.name}</div>${e.time?`<div class="dp-time">⏰ ${e.time}</div>`:''}</div><span class="tag" style="${tStyle(e.folder)};font-size:10px">${FM[e.folder]?.name||'Работа'}</span>›</div>`;}).join('')}</div>`;
}

  else if(curTab==='shopping'){el.innerHTML=renderShoppingHTML(d,curF);setTimeout(()=>initSortDrag('#fb-content','.shop-item.sort-item',()=>d.shopping,(arr)=>{d.shopping=arr;saveDB();},()=>renderFolder()),50);}

function renderProjBoard(){
  const board=db.projects.board;
  const cols=board.cols.map(col=>`
    <div class="kc cp-kc" data-col-id="${col.id}" style="width:170px">
      <div class="kc-hd">
        <span class="kc-name" style="font-size:11px">${col.name}</span>

          <span class="kc-cnt">${col.cards.length}</span>
          <button style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--t3)" onclick="openEditCol(${col.id})" title="Переименовать">✏️</button>
          <button style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--t3)" onclick="deleteCol(${col.id})" title="Удалить">🗑</button>
        </div>
      </div>
      ${col.cards.map(card=>`
        <div class="kcard" draggable="true" data-card-id="${card.id}" data-col-id="${col.id}" onclick="openEditProjCard(${col.id},${card.id})">
          <div class="kcard-name">${card.name}</div>
          ${card.desc?`<div style="font-size:11px;color:var(--t2);margin-top:2px">${card.desc}</div>`:''}
          <div style="margin-top:4px"><span class="tag" style="font-size:10px;background:${card.priority==='high'?'var(--rbg)':card.priority==='mid'?'var(--obg)':'var(--s4)'};color:${card.priority==='high'?'var(--rt)':card.priority==='mid'?'var(--ot)':'var(--t2)'}">${PL[card.priority]}</span></div>
        </div>`).join('')}
      <button style="width:100%;margin-top:4px;padding:7px;background:none;border:1.5px dashed var(--bd2);border-radius:var(--rs);cursor:pointer;color:var(--t3);font-size:12px" onclick="openAddProjCard(${col.id})">+ Карточка</button>
    </div>`).join('');
  return`<div style="margin-bottom:10px"><button class="pb pb-p pb-sm" onclick="openAddCol()">+ Колонка</button></div>
  <div class="card" style="overflow:hidden">
    <div class="proj-board-header"><span style="font-size:14px;font-weight:600">Доска проектов</span><span style="font-size:12px;color:var(--t3)">— перетаскивай карточки</span></div>
    <div class="kb-outer"><div class="kb">${cols}<div class="proj-col-add" onclick="openAddCol()">+ Добавить колонку</div></div></div>
  </div>`;
}

function initProjDrag(){
  setTimeout(()=>{
    document.querySelectorAll('[data-card-id]').forEach(card=>{
      card.draggable=true;
      card.addEventListener('dragstart',e=>{dragId=+card.dataset.cardId;dragColId=+card.dataset.colId;dragType='proj';card.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.stopPropagation();});
      card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.kc').forEach(c=>c.classList.remove('drag-over'));});
    });
    document.querySelectorAll('[data-col-id]').forEach(col=>{
      if(col.tagName==='DIV'&&col.classList.contains('kc')){
        col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
        col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
        col.addEventListener('drop',e=>{
          e.preventDefault();col.classList.remove('drag-over');
          if(dragType!=='proj'||dragId===null)return;
          const toColId=+col.dataset.colId;
          const fromCol=db.projects.board.cols.find(c=>c.id===dragColId);
          const toCol=db.projects.board.cols.find(c=>c.id===toColId);
          if(!fromCol||!toCol)return;
          const cardIdx=fromCol.cards.findIndex(c=>c.id===dragId);
          if(cardIdx===-1)return;
          const [card]=fromCol.cards.splice(cardIdx,1);
          toCol.cards.push(card);
          dragId=null;dragColId=null;dragType=null;
          renderFolder();showToast('Карточка перемещена');
        });
      }
    });
  },100);
}

function openAddProjCard(colId){showModal(`<h3>Новая карточка</h3><div class="fg"><label>Название</label><input id="pc-n" placeholder="Что нужно сделать..."></div><div class="fg"><label>Описание</label><input id="pc-d" placeholder="Детали (необязательно)"></div><div class="fg"><label>Приоритет</label><select id="pc-p"><option value="high">Высокий</option><option value="mid" selected>Средний</option><option value="low">Низкий</option></select></div><div class="mact"><button class="pb pb-s" onclick="closeModal()">Отмена</button><button class="pb pb-p" onclick="addProjCard(${colId})">Добавить</button></div>`);}
function addProjCard(colId){const n=document.getElementById('pc-n').value.trim();if(!n)return;const b=db.projects.board;const col=b.cols.find(c=>c.id===colId);col.cards.push({id:b.nextId++,name:n,desc:document.getElementById('pc-d').value,priority:document.getElementById('pc-p').value});closeModal();renderFolder();initProjDrag();showToast('Карточка добавлена');}
function openEditProjCard(colId,cardId){const col=db.projects.board.cols.find(c=>c.id===colId);const card=col.cards.find(c=>c.id===cardId);showModal(`<h3>Редактировать карточку</h3><div class="fg"><label>Название</label><input id="pc-n" value="${card.name}"></div><div class="fg"><label>Описание</label><input id="pc-d" value="${card.desc||''}"></div><div class="fg"><label>Приоритет</label><select id="pc-p"><option value="high"${card.priority==='high'?' selected':''}>Высокий</option><option value="mid"${card.priority==='mid'?' selected':''}>Средний</option><option value="low"${card.priority==='low'?' selected':''}>Низкий</option></select></div><div class="mact"><button class="pb pb-r" onclick="delProjCard(${colId},${cardId})">🗑 Удалить</button><button class="pb pb-s" onclick="closeModal()">Отмена</button><button class="pb pb-p" onclick="saveProjCard(${colId},${cardId})">Сохранить</button></div>`);}
function saveProjCard(colId,cardId){const col=db.projects.board.cols.find(c=>c.id===colId);const card=col.cards.find(c=>c.id===cardId);card.name=document.getElementById('pc-n').value.trim()||card.name;card.desc=document.getElementById('pc-d').value;card.priority=document.getElementById('pc-p').value;closeModal();renderFolder();initProjDrag();showToast('Сохранено');}
function delProjCard(colId,cardId){const col=db.projects.board.cols.find(c=>c.id===colId);col.cards=col.cards.filter(c=>c.id!==cardId);closeModal();renderFolder();initProjDrag();showToast('Карточка удалена');}

  const kpPending=db.work.leads.filter(l=>l.stage===6&&(!l.kpSentAt||(now-l.kpSentAt)<KP_DELAY));
  function kpHoursLeft(l){if(!l.kpSentAt)return 0;const left=KP_DELAY-(now-l.kpSentAt);return Math.max(0,Math.ceil(left/3600000));}

  const reminderBanner=kpWarn.length?`<div style="background:var(--rbg);border:.5px solid var(--rd);border-radius:var(--rs);padding:12px 14px;display:flex;align-items:flex-start;gap:10px;margin-bottom:4px">

    </div>

  const regularCols=LS.map((s,si)=>{
    const leads=db.work.leads.filter(l=>l.stage===si);
    return`<div class="kc" data-stage="${si}" style="width:145px">
      <div class="kc-hd"><span class="kc-name" style="font-size:9px">${s}</span><span class="kc-cnt">${leads.length}</span></div>

          <span class="tag t-${l.delivery==='cargo'?'cargo':'white'}" style="font-size:9px">${l.delivery==='cargo'?'Карго':'Белая'}</span>

        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">
          <div style="font-size:10px;color:var(--t3)">${l.source}</div>

        </div>
      </div>`).join('')}
    </div>`;
  }).join('');

  const convertCol=`<div class="kc kc-convert" data-stage="${CONVERT_STAGE}" style="width:130px">
    <div class="kc-hd"><span class="kc-name" style="color:var(--gt);font-size:9px">✅ В клиенты</span></div>

      ${l.failReason?`<div style="margin-top:3px;font-size:10px">Причина: ${l.failReason}</div>`:''}
    </div>`).join('')}
  </div>`;

  return`${stats}${reminderBanner}
  
  <div class="card" style="overflow:hidden">

}


// ── UNIVERSAL LIST SORT DRAG ────────────────────────────
function initSortDrag(containerSel, itemSel, getArr, saveArr, onDone){
  const containers = document.querySelectorAll(containerSel);
  containers.forEach(container=>{
    let dragEl=null, dragOver=null;
    const items = ()=>container.querySelectorAll(itemSel);

    items().forEach(el=>{
      el.draggable=true;
      // Touch support
      el.addEventListener('touchstart',e=>{
        dragEl=el;el.style.opacity='.4';
      },{passive:true});
      el.addEventListener('touchmove',e=>{
        e.preventDefault();
        const t=e.touches[0];
        const under=document.elementFromPoint(t.clientX,t.clientY)?.closest(itemSel);
        if(under&&under!==dragEl){
          if(dragOver)dragOver.style.borderTop='';
          dragOver=under;dragOver.style.borderTop='2px solid var(--ac)';
        }
      },{passive:false});
      el.addEventListener('touchend',()=>{
        el.style.opacity='';
        if(dragOver){dragOver.style.borderTop='';
          const arr=getArr();
          const fromIdx=+dragEl.dataset.sortIdx;
          const toIdx=+dragOver.dataset.sortIdx;
          if(fromIdx!==toIdx){
            const [moved]=arr.splice(fromIdx,1);
            arr.splice(toIdx,0,moved);
            saveArr(arr);onDone();
          }
        }
        dragEl=null;dragOver=null;
      });
      // Mouse support
      el.addEventListener('dragstart',e=>{
        dragEl=el;el.classList.add('dragging');
        e.dataTransfer.effectAllowed='move';
      });
      el.addEventListener('dragend',()=>{
        el.classList.remove('dragging');
        items().forEach(i=>i.style.borderTop='');
        dragEl=null;dragOver=null;
      });
      el.addEventListener('dragover',e=>{
        e.preventDefault();
        if(!dragEl||el===dragEl)return;
        items().forEach(i=>i.style.borderTop='');
        el.style.borderTop='2px solid var(--ac)';
        dragOver=el;
      });
      el.addEventListener('drop',e=>{
        e.preventDefault();
        if(!dragEl||dragEl===el)return;
        items().forEach(i=>i.style.borderTop='');
        const arr=getArr();
        const fromIdx=+dragEl.dataset.sortIdx;
        const toIdx=+el.dataset.sortIdx;
        if(fromIdx!==toIdx){
          const [moved]=arr.splice(fromIdx,1);
          arr.splice(toIdx,0,moved);
          saveArr(arr);onDone();
        }
        dragEl=null;dragOver=null;
      });
    });
  });
}

function initLeadDrag(){

      card.draggable=true;
      card.addEventListener('dragstart',e=>{dragId=+card.dataset.lid;dragType='lead';card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
      card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.kc').forEach(c=>c.classList.remove('drag-over'));});
    });
    document.querySelectorAll('.kc[data-stage]').forEach(col=>{
      col.addEventListener('dragover',e=>{e.preventDefault();if(dragType==='lead')col.classList.add('drag-over');});
      col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
      col.addEventListener('drop',e=>{
        e.preventDefault();col.classList.remove('drag-over');
        if(dragType!=='lead'||dragId===null)return;
        const stage=+col.dataset.stage;
        const l=db.work.leads.find(x=>x.id===dragId);
        if(!l)return;
        if(stage===CONVERT_STAGE){
          const nid=Math.max(0,...db.work.clients.map(c=>c.id))+1;
          const _lc=l.comments.map(c=>({...c,note:'(из лида)'}));db.work.clients.push({id:nid,clientId:'ID-00'+nid,name:l.name,phone:l.phone,messenger:l.messenger,product:l.product,delivery:l.delivery,source:l.source,comments:_lc,orders:[]});
          db.work.leads=db.work.leads.filter(x=>x.id!==dragId);
          showToast(`✅ ${l.name} → клиент!`);updateFC();
        } else if(stage===FAIL_STAGE){
          const _prev4=l.stage;l.stage=FAIL_STAGE;if(!l.stageLog)l.stageLog=[];l.stageLog.push({from:_prev4,to:FAIL_STAGE,ts:Date.now()});
          // prompt for reason
          const reason=prompt('Причина провала сделки:','');
          if(reason!==null)l.failReason=reason;
          showToast(`💔 ${l.name} — сделка провалена`);
        } else {
          const _prev5=l.stage;l.stage=stage;if(stage===6){l.kpSentAt=Date.now();l.noAnswer=false;}else{l.kpSentAt=null;l.noAnswer=false;}if(!l.stageLog)l.stageLog=[];l.stageLog.push({from:_prev5,to:stage,ts:Date.now()});
        }
        dragId=null;dragType=null;renderWork();
      });
    });
  },100);
}

function renderWTasksHTML(){const d=db.work,pend=d.tasks.filter(t=>!t.done),done=d.tasks.filter(t=>t.done);const row=(t,idx)=>`<div class="ti sort-item" data-sort-idx="${idx}"><div class="cb${t.done?' done':''}" onclick="wqT(${t.id})">${t.done?'✓':''}</div><div class="pdot" style="background:${PC[t.priority]}"></div><div style="flex:1;cursor:pointer" onclick="openTaskCard('work',${t.id},'work')"><div style="font-size:14px;font-weight:500${t.done?';text-decoration:line-through;color:var(--t3)':''}">${t.name}</div><div style="font-size:12px;color:var(--t2);margin-top:2px">${t.due?fmtDate(t.due):'-'}${t.time?' · '+t.time:''}</div></div><button class="pb pb-s pb-sm" onclick="openEditTask('work',${t.id})">✏️</button></div>`;return`<div style="margin-bottom:10px"><button class="pb pb-p pb-sm" onclick="openAddWT()">+ Задача</button></div>${pend.map((t,i)=>row(t,i)).join('')}${done.length?`<div class="sl" style="margin-top:10px">Выполнено</div>${done.map((t,i)=>row(t,pend.length+i)).join('')}`:''}${!d.tasks.length?'<div class="empty">Нет задач</div>':''}`;}

function initContentDrag(){
  setTimeout(()=>{
    document.querySelectorAll('.cp-card[data-cp-id]').forEach(card=>{
      card.draggable=true;
      card.addEventListener('dragstart',e=>{dragId=+card.dataset.cpId;dragType='content';card.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.stopPropagation();});
      card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.kc').forEach(c=>c.classList.remove('drag-over'));});
    });
    document.querySelectorAll('.kc[data-cp-stage]').forEach(col=>{
      col.addEventListener('dragover',e=>{e.preventDefault();if(dragType==='content')col.classList.add('drag-over');});
      col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
      col.addEventListener('drop',e=>{
        e.preventDefault();col.classList.remove('drag-over');

function setClientSort(s){clientSort=s;renderWork();}
function renderClients(){
  const stageColor=(s)=>{
    if(s===9)return{bg:'rgba(52,199,89,.15)',c:'var(--gt)'};
    if(s===8)return{bg:'rgba(0,122,255,.15)',c:'#4da3ff'};
    if(s===7)return{bg:'rgba(255,149,0,.15)',c:'var(--or)'};
    if(s===6)return{bg:'rgba(255,149,0,.1)',c:'#e8a020'};
    if(s===5)return{bg:'rgba(175,82,222,.15)',c:'#bf7fe0'};
    if(s===4)return{bg:'rgba(90,200,250,.15)',c:'#5ac8fa'};
    return{bg:'var(--s3)',c:'var(--t3)'};
  };
  // Sort clients
  const sorted=[...db.work.clients];
  const stageNum=!isNaN(+clientSort)&&clientSort!=='default'?+clientSort:null;
  if(stageNum!==null){
    // Filter: only show clients with at least one order at this stage
    sorted.splice(0,sorted.length,...sorted.filter(c=>c.orders.some(o=>o.stage===stageNum)));
  } else if(clientSort==='done'){
    sorted.sort((a,b)=>b.orders.filter(o=>o.stage===9).length-a.orders.filter(o=>o.stage===9).length);
  } else if(clientSort==='profit'){
    sorted.sort((a,b)=>{
      const profit=c=>c.orders.reduce((s,o)=>{const m=((+o.payment.priceY||0)-(+o.payment.costY||0))*(+o.payment.rateIn||0);const f=(+o.payment.priceY||0)*((+o.payment.rateOut||0)-(+o.payment.rateIn||0));const cm=(+o.payment.priceY||0)*(+o.payment.rateOut||0)*(+o.payment.comm||0)/100;return s+m+f+cm;},0);
      return profit(b)-profit(a);
    });
  }
  // Collect all unique stages present in orders
  const allStages=[...new Set(db.work.clients.flatMap(c=>c.orders.map(o=>o.stage)))].sort((a,b)=>a-b);
  const filterLabel=clientSort==='default'?'Все клиенты':clientSort==='profit'?'По прибыли':clientSort==='done'?'Завершённые':OS[+clientSort]||'Все клиенты';
  return`<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
    <div style="position:relative">
      <button onclick="document.getElementById('client-filter-dd').classList.toggle('hidden')" style="padding:6px 14px;border-radius:20px;border:.5px solid var(--bd2);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:${clientSort!=='default'?'var(--ac)':'var(--s3)'};color:${clientSort!=='default'?'#fff':'var(--t2)'};display:flex;align-items:center;gap:6px">
        ${filterLabel} ▾
      </button>
      <div id="client-filter-dd" class="hidden" style="position:absolute;top:calc(100% + 6px);left:0;background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--rs);z-index:100;min-width:200px;box-shadow:0 8px 24px rgba(0,0,0,.3);overflow:hidden">
        <div onclick="setClientSort('default');document.getElementById('client-filter-dd').classList.add('hidden')" style="padding:10px 14px;font-size:13px;cursor:pointer;font-weight:${clientSort==='default'?'700':'400'};color:${clientSort==='default'?'var(--ac)':'var(--t1)'}">✦ Все клиенты</div>
        <div style="height:.5px;background:var(--bd)"></div>
        <div style="padding:6px 14px;font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px">По стадии заказа</div>
        ${allStages.map(s=>`<div onclick="setClientSort('${s}');document.getElementById('client-filter-dd').classList.add('hidden')" style="padding:9px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;background:${clientSort==s?'rgba(0,122,255,.08)':'transparent'}">
          <span style="background:${stageColor(s).bg};color:${stageColor(s).c};padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600">${OS[s]}</span>
        </div>`).join('')}
        <div style="height:.5px;background:var(--bd)"></div>
        <div style="padding:6px 14px;font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px">Другое</div>
        <div onclick="setClientSort('profit');document.getElementById('client-filter-dd').classList.add('hidden')" style="padding:9px 14px;font-size:13px;cursor:pointer;color:${clientSort==='profit'?'var(--ac)':'var(--t1)'}">💰 По прибыли</div>
        <div onclick="setClientSort('done');document.getElementById('client-filter-dd').classList.add('hidden')" style="padding:9px 14px;font-size:13px;cursor:pointer;color:${clientSort==='done'?'var(--ac)':'var(--t1)'}">✅ Завершённые</div>
      </div>
    </div>
    ${clientSort!=='default'&&clientSort!=='profit'&&clientSort!=='done'?`<button onclick="setClientSort('default')" style="padding:5px 12px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-family:inherit;background:var(--s3);color:var(--t2)">✕ Сбросить</button>`:''}
  </div>
  <div class="card">${sorted.length?sorted.map((c,idx)=>{
  const active=c.orders.filter(o=>o.stage<9).length;
  const profitGoods=c.orders.reduce((s,o)=>{
    const m=((+o.payment.priceY||0)-(+o.payment.costY||0))*(+o.payment.rateIn||0);
    const fx=(+o.payment.priceY||0)*((+o.payment.rateOut||0)-(+o.payment.rateIn||0));
    const cm=(+o.payment.priceY||0)*(+o.payment.rateOut||0)*(+o.payment.comm||0)/100;
    return s+m+fx+cm;
  },0);
  const profitDel=c.orders.reduce((s,o)=>s+((+o.delivery.rateOut||0)-(+o.delivery.rateIn||0))*(+o.delivery.weight||0),0);
  const orderLines=c.orders.length?c.orders.map(o=>`<div style="font-size:11px;margin-top:3px;display:flex;align-items:center;gap:5px"><span style="color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px">${o.name}</span><span style="background:${stageColor(o.stage).bg};color:${stageColor(o.stage).c};padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600;flex-shrink:0">${OS[o.stage]}</span></div>`).join(''):'';
  return`<div class="cr sort-item" data-sort-idx="${idx}" onclick="openClient(${c.id})"><div class="av ${avC(c.name)}">${ini(c.name)}</div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:500">${c.name}</div><div style="font-size:12px;color:var(--t2);margin-top:2px">${c.clientId} · ${c.product}</div>${orderLines}</div><div style="text-align:right;flex-shrink:0"><div style="font-size:13px;font-weight:700;color:var(--gt)">${fmtR(profitGoods)}</div><div style="font-size:11px;color:var(--gt);margin-top:1px">+ ${fmtD(profitDel)}</div></div>›</div>`;}).join(''):'<div class="empty">Нет клиентов</div>'}</div>`;}

// ── ASSISTANT TASKS ────────────────────────────────────
let _asTasks=[];
async function loadAssistantTasks(){
  if(!_sb)return;
  const{data,error}=await _sb.from('assistant_tasks').select('*').order('created_at',{ascending:false});
  if(!error&&data)_asTasks=data;
}
async function saveAssistantTask(task){
  if(!_sb)return;
  if(task.id){
    await _sb.from('assistant_tasks').update({title:task.title,description:task.description,status:task.status,photos:task.photos,comments:task.comments,updated_at:new Date().toISOString()}).eq('id',task.id);
  }else{
    const{data}=await _sb.from('assistant_tasks').insert([{title:task.title,description:task.description,status:task.status||'new',photos:task.photos||[],comments:task.comments||[]}]).select();
    if(data&&data[0])_asTasks.unshift(data[0]);
  }
  await loadAssistantTasks();
  await checkAssistantResults();
  setInterval(async()=>{await loadAssistantTasks();await checkAssistantResults();},30000);
  renderWork();
}
async function deleteAssistantTask(id){
  if(!_sb)return;
  await _sb.from('assistant_tasks').delete().eq('id',id);
  _asTasks=_asTasks.filter(t=>t.id!==id);
  renderWork();showToast('Задание удалено');
}

        ${t.description?`<div style="font-size:13px;color:var(--t2);margin-top:8px;white-space:pre-wrap;word-break:break-word">${t.description}</div>`:''}

async function submitSendToAssistant(sourceType){
  const tzRu=document.getElementById('at-tz-ru')?.value.trim()||'';
  const tzCn=document.getElementById('at-tz-cn')?.value.trim()||'';
  const links=document.getElementById('at-links')?.value.trim()||'';
  const filesInp=document.getElementById('at-files');
  const files=filesInp?[...filesInp.files]:[];

  if(!tzRu){showToast('Введи ТЗ на русском');return;}

  const status=document.getElementById('at-upload-status');
  if(status)status.style.display='block';

  // Upload files to Cloudinary
  const attachments=[];
  for(const file of files){
    try{
      const fd=new FormData();
      fd.append('file',file);
      fd.append('upload_preset',CLD_PRESET);
      fd.append('folder','crm-tasks');
      fd.append('resource_type','auto');
      const r=await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/auto/upload`,{method:'POST',body:fd});
      const d=await r.json();
      if(d.secure_url)attachments.push({url:d.secure_url,name:file.name,type:file.type});
    }catch(e){console.error(e);}
  }

  if(status)status.style.display='none';

  // Build description
  let desc=`🇷🇺 ${tzRu}`;
  if(tzCn)desc+=`

🇨🇳 ${tzCn}`;
  if(links){const ls=links.split('\n').filter(Boolean);if(ls.length)desc+='\n\n🔗 Ссылки:\n'+ls.join('\n');}

  // Source info
  const source=sourceType==='lead'
    ? db.work.leads.find(x=>x.id===curLead)
    : db.work.clients.find(x=>x.id===curClient)?.orders.find(x=>x.id===curOrder);
  const sourceName=sourceType==='lead'
    ? (db.work.leads.find(x=>x.id===curLead)?.name||'Лид')
    : (db.work.clients.find(x=>x.id===curClient)?.name+' / '+(source?.name||'Заказ'));
  const title=`${sourceName} — ${sourceType==='lead'?'Лид':'Заказ'}`;

  closeModal();showToast('⏳ Отправляю задание...');

  // Check if task already exists
  const existingId=source?.assistantTaskId;
  let taskId;

  if(existingId){
    // Update existing task
    const{data:existing}=await _sb.from('assistant_tasks').select('*').eq('id',existingId).single();
    const newAttachments=[...(existing?.attachments||[]),...attachments];
    await _sb.from('assistant_tasks').update({
      title,description:desc,attachments:newAttachments,
      source_type:sourceType,source_id:sourceType==='lead'?curLead:curOrder,
      client_id:curClient,updated_at:new Date().toISOString()
    }).eq('id',existingId);
    taskId=existingId;
  }else{
    // Create new task
    const{data}=await _sb.from('assistant_tasks').insert([{
      title,description:desc,status:'new',
      attachments,photos:[],comments:[],result_link:'',
      source_type:sourceType,source_id:sourceType==='lead'?curLead:curOrder,
      client_id:curClient
    }]).select();
    if(data&&data[0])taskId=data[0].id;
  }

  // Save taskId back to lead/order
  if(taskId){
    if(sourceType==='lead'){
      const l=db.work.leads.find(x=>x.id===curLead);
      if(l)l.assistantTaskId=taskId;
    }else{
      const o=db.work.clients.find(x=>x.id===curClient)?.orders.find(x=>x.id===curOrder);
      if(o)o.assistantTaskId=taskId;
    }
    saveDB();
  }

  await loadAssistantTasks();
  await checkAssistantResults();
  setInterval(async()=>{await loadAssistantTasks();await checkAssistantResults();},30000);
  if(sourceType==='lead')renderLead();
  else renderOrder();
  showToast('✅ Задание отправлено ассистенту!');
}

// Poll for completed assistant tasks and update lead/order stage
async function checkAssistantResults(){
  if(!_sb)return;
  const{data}=await _sb.from('assistant_tasks').select('*').eq('status','done');
  if(!data)return;
  data.forEach(t=>{
    if(t.source_type==='lead'){
      const l=db.work.leads.find(x=>x.assistantTaskId===t.id);
      if(l&&l.stage===4){
        l.stage=5; // Товар найден
        l.assistantResult={link:t.result_link,photos:t.photos,attachments:t.attachments};
        if(!l.stageLog)l.stageLog=[];
        l.stageLog.push({from:4,to:5,ts:Date.now(),note:'Товар найден ассистентом'+(t.result_link?' 🔗':' ')});
        saveDB();
      }
    }else if(t.source_type==='order'){
      const c=db.work.clients.find(x=>x.id===t.client_id);
      const o=c?.orders.find(x=>x.assistantTaskId===t.id);
      if(o&&o.stage===0){
        o.stage=1; // Товар найден
        o.assistantResult={link:t.result_link,photos:t.photos,attachments:t.attachments};
        if(!o.stageLog)o.stageLog=[];
        o.stageLog.push({from:0,to:1,ts:Date.now(),note:'Товар найден ассистентом'+(t.result_link?' 🔗':'')});
        saveDB();
      }
    }
  });
}

function setStatPeriod(p){statPeriod=p;renderWork();}
function filterByPeriod(orders){
  if(statPeriod==='all')return orders;
  const now=new Date();
  return orders.filter(o=>{
    // Приоритет: фактическая дата прибытия → дата оплаты → не учитываем
    const dateStr=o.delivery?.actualArrDate||o.payment?.date||'';
    if(!dateStr)return false;
    const d=new Date(dateStr+'T00:00');
    if(statPeriod==='month')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(statPeriod==='prev'){const p=new Date(now.getFullYear(),now.getMonth()-1,1);return d.getMonth()===p.getMonth()&&d.getFullYear()===p.getFullYear();}
    if(statPeriod==='range'){
      const from=statFrom?new Date(statFrom+'T00:00'):null;
      const to=statTo?new Date(statTo+'T23:59'):null;
      return(!from||d>=from)&&(!to||d<=to);
    }
    return true;
  });
}

  else if(p==='prev'){const p2=new Date(now.getFullYear(),now.getMonth()-1,1);const y=p2.getFullYear(),m=String(p2.getMonth()+1).padStart(2,'0');statFrom=`${y}-${m}-01`;statTo=`${y}-${m}-${String(new Date(y,p2.getMonth()+1,0).getDate()).padStart(2,'0')}`;}

function renderWStats(){
  const allOrders=filterByPeriod(db.work.clients.flatMap(c=>c.orders));
  const rev=allOrders.reduce((s,o)=>s+(+o.payment.priceY||0)*(+o.payment.rateOut||0),0);
  const totalProfit=allOrders.reduce((s,o)=>{
    const markup=((+o.payment.priceY||0)-(+o.payment.costY||0))*(+o.payment.rateIn||0);
    const fx=(+o.payment.priceY||0)*((+o.payment.rateOut||0)-(+o.payment.rateIn||0));
    const comm=(+o.payment.priceY||0)*(+o.payment.rateOut||0)*(+o.payment.comm||0)/100;
    return s+markup+fx+comm;
  },0);
  const totalDelProfit=allOrders.reduce((s,o)=>s+(+o.delivery.rateOut||0)*(+o.delivery.weight||0),0)-allOrders.reduce((s,o)=>s+(+o.delivery.rateIn||0)*(+o.delivery.weight||0),0);

  const failed=db.work.leads.filter(l=>l.stage===FAIL_STAGE).length;
  const avgCheck=dn?totalProfit/dn:0;

  // Monthly profit chart (last 6 months)

    const mOrders=allOrders.filter(o=>o.payment.date&&o.payment.date.startsWith(m.key));
    return{label:m.label,profit:mOrders.reduce((s,o)=>{const markup=((+o.payment.priceY||0)-(+o.payment.costY||0))*(+o.payment.rateIn||0);const fx=(+o.payment.priceY||0)*((+o.payment.rateOut||0)-(+o.payment.rateIn||0));const comm=(+o.payment.priceY||0)*(+o.payment.rateOut||0)*(+o.payment.comm||0)/100;return s+markup+fx+comm;},0)};
  });
  const maxP=Math.max(...monthProfit.map(m=>m.profit),1);
  const chartBars=monthProfit.map(m=>{
    const h=Math.max(4,Math.round((m.profit/maxP)*80));

  const topClients=[...db.work.clients].map(c=>{

      const comm=(+o.payment.priceY||0)*(+o.payment.rateOut||0)*(+o.payment.comm||0)/100;
      return s+markup+fx+comm;
    },0);
    const profitDel=filtOrders.reduce((s,o)=>s+((+o.delivery.rateOut||0)-(+o.delivery.rateIn||0))*(+o.delivery.weight||0),0);
    return{name:c.name,orders:c.orders,profitGoods,profitDel,total:profitGoods};

  const topHTML=topClients.map((c,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px solid var(--bd)">

  const now2=new Date();

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div><div style="font-size:11px;color:var(--t2);margin-bottom:4px">От</div><input type="date" id="stat-from" value="${statFrom||''}" onchange="applyDateRange()" style="width:100%;padding:8px 10px;border:.5px solid var(--bd2);border-radius:var(--rs);background:var(--s2);color:var(--t1);font-size:13px;font-family:inherit;box-sizing:border-box"></div>
      <div><div style="font-size:11px;color:var(--t2);margin-bottom:4px">До</div><input type="date" id="stat-to" value="${statTo||''}" onchange="applyDateRange()" style="width:100%;padding:8px 10px;border:.5px solid var(--bd2);border-radius:var(--rs);background:var(--s2);color:var(--t1);font-size:13px;font-family:inherit;box-sizing:border-box"></div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button onclick="quickRange('month')" style="padding:4px 10px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;background:var(--s3);color:var(--t2)">Этот месяц</button>
      <button onclick="quickRange('prev')" style="padding:4px 10px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;background:var(--s3);color:var(--t2)">Прошлый месяц</button>
      <button onclick="quickRange('all')" style="padding:4px 10px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;background:var(--s3);color:var(--t2)">За всё время</button>
    </div>
  </div>
  <div class="stats"><div class="stat"><div class="stat-l">Прибыль с товара</div><div class="stat-v" style="color:var(--gt);font-size:16px">${fmtR(totalProfit)}</div><div class="stat-s" style="color:var(--gt)">+ ${fmtD(totalDelProfit)} дост.</div></div><div class="stat"><div class="stat-l">Клиентов</div><div class="stat-v">${db.work.clients.length}</div></div><div class="stat"><div class="stat-l">В пути</div><div class="stat-v">${inW}</div></div><div class="stat"><div class="stat-l">Завершено</div><div class="stat-v">${dn}</div></div></div>
  <div class="stats" style="margin-top:9px"><div class="stat"><div class="stat-l">Отправлено кг</div><div class="stat-v">${allOrders.reduce((s,o)=>s+(+o.delivery.weight||0),0).toFixed(1)}</div></div><div class="stat"><div class="stat-l">Лидов провалено</div><div class="stat-v" style="color:var(--rt)">${failed}</div></div><div class="stat"><div class="stat-l">Конверсия</div><div class="stat-v">${Math.round(db.work.clients.length/(db.work.leads.filter(l=>l.stage!==FAIL_STAGE).length+db.work.clients.length||1)*100)}%</div></div><div class="stat"><div class="stat-l">Лидов в работе</div><div class="stat-v">${db.work.leads.filter(l=>l.stage<CONVERT_STAGE&&l.stage!==FAIL_STAGE).length}</div></div></div>
  <div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px">

      <div style="display:flex;align-items:flex-end;gap:6px;height:100px;padding:0 4px">${chartBars}</div>

}

// ── LEAD CARD ──────────────────────────────────────────
function openLead(id){curLead=id;const l=db.work.leads.find(x=>x.id===id);document.getElementById('lead-title').textContent=l.name;document.getElementById('conv-btn').style.display=l.stage>=7&&l.stage!==FAIL_STAGE?'':'none';renderLead();showScreen('s-lead');}

  const cH=l.comments.map(c=>`<div class="comment"><div class="cav">Я</div><div style="flex:1"><div class="cmeta">${tsLbl(c.ts)}</div><div class="ctext">${c.text}</div></div></div>`).join('')||`<div style="font-size:13px;color:var(--t3)">Нет комментариев</div>`;

    <div class="card">

        ${l.website?`<div class="fr"><span class="fl">Сайт</span><a href="${l.website}" target="_blank" class="fv" style="color:var(--ac)">${l.website}</a></div>`:''}
        <div class="fr"><span class="fl">Мессенджер</span><span class="fv">${l.messenger}</span></div>
        <div class="fr"><span class="fl">Источник</span><span class="fv">${l.source}</span></div>

      </div>
      ${l.stage===4?`<div class="cs" style="background:rgba(175,82,222,.08);border:.5px solid rgba(175,82,222,.3);border-radius:var(--rs);padding:12px 14px;margin-bottom:6px">
        <div style="font-size:13px;font-weight:600;color:#bf7fe0;margin-bottom:10px">🔍 Поиск товара — отправить задание ассистенту</div>
        ${l.assistantTaskId?`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:12px;color:var(--t2)">Задание #${l.assistantTaskId} отправлено</span>
          <button class="pb pb-sm" onclick="openAssistantTaskFromLead()" style="font-size:11px;background:rgba(175,82,222,.15);color:#bf7fe0;border:none">Открыть →</button>
        </div>`:''}
        <button class="pb pb-sm" style="background:rgba(175,82,222,.15);color:#bf7fe0;border:none;font-size:13px;font-weight:600" onclick="openSendToAssistant('lead',${l.id})">📤 ${l.assistantTaskId?'Обновить задание':'Отправить ассистенту'}</button>
      </div>`:''}
      ${l.stage===6?`<div class="cs" style="background:rgba(0,122,255,.06);border:.5px solid rgba(0,122,255,.2);border-radius:var(--rs);padding:12px 14px;margin-bottom:2px">
        <div style="font-size:13px;font-weight:600;color:var(--ac);margin-bottom:10px">📋 КП готово — ссылка на таблицу</div>
        <input id="lead-kp-link" type="url" placeholder="https://docs.google.com/spreadsheets/..." value="${l.kpLink||''}" style="width:100%;font-size:14px;padding:9px 11px;border:.5px solid var(--bd2);border-radius:var(--rs);background:var(--sf);color:var(--t1);font-family:inherit;box-sizing:border-box;margin-bottom:10px">
        <div style="display:flex;gap:8px">

        </div>
      </div>`:''}
      ${l.kpLink&&l.stage!==5?`<div style="padding:9px 12px;background:rgba(0,122,255,.08);border:.5px solid rgba(0,122,255,.2);border-radius:var(--rs);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between"><span style="font-size:13px;color:var(--ac)">📋 КП</span><a href="${l.kpLink}" target="_blank" style="color:var(--ac);font-size:13px;font-weight:500">🔗 Открыть</a></div>`:''}
      <div class="cs">
        <div class="cs-title" style="margin-bottom:9px">Фото</div>
        ${l.photos&&l.photos.length?`<div id="lead-photo-grid" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">${l.photos.map((url,i)=>`<div class="lead-photo-thumb" draggable="true" data-idx="${i}" style="position:relative;cursor:grab"><img src="${url}" onclick="openLeadLightbox(${i})" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:.5px solid var(--bd2);cursor:zoom-in"><button onclick="removeLeadPhoto(${i})" style="position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:var(--rd);color:#fff;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;z-index:2">✕</button></div>`).join('')}</div>`:''}
        <label style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;background:var(--s3);color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;border:.5px solid var(--bd2)">
          📷 Загрузить фото
          <input type="file" accept="image/*" id="lead-photo-inp" style="display:none" multiple>
        </label>
      </div>
      <div class="cs">
        <div class="cs-title" style="margin-bottom:9px">Запись звонка</div>
        ${l.calls&&l.calls.length?`<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px">${l.calls.map((c,i)=>`<div style="background:var(--s2);border-radius:var(--rs);padding:10px 13px;border:.5px solid var(--bd2)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <span style="font-size:12px;font-weight:600">📞 Звонок ${tsLbl(c.ts)}</span>
            <button onclick="removeCall(${i})" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px">✕</button>
          </div>
          ${c.audioUrl?`<audio controls style="width:100%;margin-bottom:8px;border-radius:8px;height:36px"><source src="${c.audioUrl}"><p style="font-size:11px;color:var(--t3)">Аудио недоступно</p></audio>`:''}
          <div style="font-size:12px;color:var(--t2);margin-bottom:6px;font-weight:600">Саммари:</div>
          <div style="font-size:12px;color:var(--t1);white-space:pre-wrap;margin-bottom:8px">${c.summary}</div>
          <details><summary style="font-size:11px;color:var(--t3);cursor:pointer">Полная расшифровка</summary><div style="font-size:11px;color:var(--t2);margin-top:6px;white-space:pre-wrap;line-height:1.5">${c.transcript}</div></details>
        </div>`).join('')}</div>`:''}
        <div id="call-upload-status" style="display:none;font-size:12px;color:var(--ac);margin-bottom:8px;padding:8px 12px;background:rgba(0,122,255,.08);border-radius:var(--rs)">⏳ Обрабатываю запись...</div>
        <button class="pb pb-s pb-sm" onclick="triggerCallUpload()" style="font-size:13px">🎙 Загрузить запись звонка</button>
      </div>
      <div class="cs">
        <div class="cs-title" style="margin-bottom:10px">📋 Задачи и напоминания</div>
        ${l.tasks&&l.tasks.length?`<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">${l.tasks.map((t,i)=>`<div style="display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:${t.done?'var(--s2)':'var(--sf)'};border:.5px solid ${t.done?'var(--bd)':t.date&&new Date(t.date+'T'+t.time)<new Date()&&!t.done?'rgba(255,59,48,.3)':'var(--bd2)'};border-radius:var(--rs);opacity:${t.done?'.6':'1'}">
          <input type="checkbox" ${t.done?'checked':''} onchange="toggleLeadTask(${i})" style="margin-top:2px;width:16px;height:16px;cursor:pointer;flex-shrink:0">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:500;${t.done?'text-decoration:line-through;color:var(--t3)':''}">${t.text}</div>
            ${t.date||t.time?`<div style="font-size:11px;color:${t.date&&new Date(t.date+'T'+(t.time||'00:00'))<new Date()&&!t.done?'var(--rd)':'var(--ac)'};margin-top:3px">⏰ ${t.date?fmtDate(t.date):''} ${t.time||''}</div>`:''}
          </div>
          <button onclick="removeLeadTask(${i})" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;flex-shrink:0">✕</button>
        </div>`).join('')}</div>`:''}
        <div style="display:flex;flex-direction:column;gap:8px">
          <input id="lt-text" placeholder="Описание задачи..." style="padding:9px 11px;border:.5px solid var(--bd2);border-radius:var(--rs);background:var(--sf);color:var(--t1);font-size:14px;font-family:inherit;width:100%;box-sizing:border-box">
          <div style="display:flex;gap:8px">
            <input id="lt-date" type="date" style="flex:1;padding:8px 10px;border:.5px solid var(--bd2);border-radius:var(--rs);background:var(--sf);color:var(--t1);font-size:13px;font-family:inherit">
            <input id="lt-time" type="time" style="flex:1;padding:8px 10px;border:.5px solid var(--bd2);border-radius:var(--rs);background:var(--sf);color:var(--t1);font-size:13px;font-family:inherit">
          </div>
          <button class="pb pb-p pb-sm" onclick="addLeadTask()">+ Добавить задачу</button>
        </div>
      </div>
      <div class="cs"><div class="cs-title" style="margin-bottom:9px">Комментарии</div>
        <div>${cH}</div>
        <div class="cinput"><textarea id="lc-i" placeholder="Комментарий..." onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter'){event.preventDefault();addLC();}"></textarea><button class="pb pb-p pb-sm" onclick="addLC()">→</button></div>
      </div>
    </div>
    ${l.stageLog&&l.stageLog.length?`<div class="card"><div class="cs">
      <div class="cs-title" style="margin-bottom:9px">История этапов</div>

        const toName=e.to===FAIL_STAGE?'Провалено':e.to===CONVERT_STAGE?'В клиенты':(LS[e.to]||'—');
        return`<div style="display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:.5px solid var(--bd)">

            ${e.note?`<div style="font-size:11px;color:var(--t3);margin-top:2px">${e.note}</div>`:''}
          </div>
          <div style="font-size:11px;color:var(--t3);white-space:nowrap;flex-shrink:0">${tsLbl(e.ts)}</div>

    <div style="display:flex;gap:8px;flex-wrap:wrap">
