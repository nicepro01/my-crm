    </div>`;
}
function setLS(id,stage){const l=db.work.leads.find(x=>x.id===id);const wasKP=l.stage===6;const prevStage=l.stage;l.stage=stage;if(stage===6&&!wasKP){l.kpSentAt=Date.now();l.noAnswer=false;l.kpDismissed=false;}else if(stage!==6){l.kpSentAt=null;l.noAnswer=false;}if(!l.stageLog)l.stageLog=[];l.stageLog.push({from:prevStage,to:stage,ts:Date.now()});document.getElementById('conv-btn').style.display=stage>=7&&stage!==FAIL_STAGE?'':'none';saveDB();renderLead();}
function failLead(id){const l=db.work.leads.find(x=>x.id===id);const reason=prompt('Причина провала сделки:','');const prev=l.stage;l.stage=FAIL_STAGE;if(reason!==null)l.failReason=reason;if(!l.stageLog)l.stageLog=[];l.stageLog.push({from:prev,to:FAIL_STAGE,ts:Date.now(),note:'Провалено: '+(reason||'')});document.getElementById('conv-btn').style.display='none';saveDB();renderLead();showToast('Сделка отмечена как провалена');}
function reopenLead(id){const l=db.work.leads.find(x=>x.id===id);const prev=l.stage;l.stage=0;l.failReason='';if(!l.stageLog)l.stageLog=[];l.stageLog.push({from:prev,to:0,ts:Date.now(),note:'Возвращён в работу'});saveDB();renderLead();showToast('Лид возвращён в работу');}
function openEditFailReason(id){const l=db.work.leads.find(x=>x.id===id);const r=prompt('Причина провала:',l.failReason||'');if(r!==null){l.failReason=r;renderLead();showToast('Причина обновлена');}}
function dismissKpReminder(id){
  const l=db.work.leads.find(x=>x.id===id);
  if(!l)return;
  // Reset kpSentAt so the 24h check won't trigger again, keep stage
  l.kpSentAt=Date.now();
  l.kpDismissed=true;
  saveDB();renderWork();showToast('Напоминание убрано');
}
function saveLeadKpLink(){
  const l=db.work.leads.find(x=>x.id===curLead);
  l.kpLink=document.getElementById('lead-kp-link')?.value.trim()||'';
  saveDB();renderLead();showToast('Ссылка на КП сохранена');
  setTimeout(()=>{initLeadPhotoUpload();initLeadPhotoDrag();},80);
}
function addLC(){const txt=document.getElementById('lc-i').value.trim();if(!txt)return;db.work.leads.find(x=>x.id===curLead).comments.push({text:txt,ts:Date.now()});renderLead();showToast('Комментарий добавлен');}
function convertLead(){const l=db.work.leads.find(x=>x.id===curLead);if(!l)return;const nid=Math.max(0,...db.work.clients.map(c=>c.id))+1;const leadComments=l.comments.map(c=>({...c,note:'(из лида)'}));db.work.clients.push({id:nid,clientId:'ID-00'+nid,name:l.name,phone:l.phone,messenger:l.messenger,product:l.product,delivery:l.delivery,source:l.source,comments:leadComments,orders:[]});db.work.leads=db.work.leads.filter(x=>x.id!==curLead);saveDB();showToast(`✅ ${l.name} стал клиентом!`);showScreen('s-work');renderWork();workTab('clients');updateFC();}
function delLead(id){db.work.leads=db.work.leads.filter(x=>x.id!==id);showScreen('s-work');renderWork();showToast('Лид удалён');}

// ── CLIENT CARD with analytics ─────────────────────────
function openClient(id){curClient=id;const c=db.work.clients.find(x=>x.id===id);document.getElementById('client-title').textContent=c.name;renderClient();showScreen('s-client');}
function renderClient(){
  const c=db.work.clients.find(x=>x.id===curClient);
  const sc=['#8e8e93','#ff9500','#ff6b00','#0071e3','#34c759','#007aff','#af52de','#ff3b30','#30d158'];
  const sb=['rgba(142,142,147,.12)','rgba(255,149,0,.12)','rgba(255,107,0,.12)','rgba(0,113,227,.12)','rgba(52,199,89,.12)','rgba(0,122,255,.12)','rgba(175,82,222,.12)','rgba(255,59,48,.12)','rgba(48,209,88,.12)'];

  // ── Client Analytics ──
  const completedOrders=c.orders.filter(o=>o.stage===9);
  const activeOrders=c.orders.filter(o=>o.stage<9);
  // Накрутка на товаре = (priceY - costY) × rateIn
  const totalMarkup=c.orders.reduce((s,o)=>s+((+o.payment.priceY||0)-(+o.payment.costY||0))*(+o.payment.rateIn||0),0);
  // Прибыль на курсе = priceY × (rateOut - rateIn)
  const totalFxProfit=c.orders.reduce((s,o)=>s+(+o.payment.priceY||0)*((+o.payment.rateOut||0)-(+o.payment.rateIn||0)),0);
  // Комиссия = priceY × rateOut × comm%
  const totalCommRub=c.orders.reduce((s,o)=>s+(+o.payment.priceY||0)*(+o.payment.rateOut||0)*(+o.payment.comm||0)/100,0);
  // Итого прибыль с товара
  const totalProfitGoods=totalMarkup+totalFxProfit+totalCommRub;
  const totalWeightSent=c.orders.reduce((s,o)=>s+(+o.delivery.weight||0),0);
  const totalDelRevDollar=c.orders.reduce((s,o)=>s+(+o.delivery.rateOut||0)*(+o.delivery.weight||0),0);
  const totalDelCostDollar=c.orders.reduce((s,o)=>s+(+o.delivery.rateIn||0)*(+o.delivery.weight||0),0);
  const profitDel=totalDelRevDollar-totalDelCostDollar;
  const lastOrderDate=c.orders.length?[...c.orders].sort((a,b)=>b.payment.date?.localeCompare(a.payment.date||'')||0)[0].payment.date:'—';
  const inWay=c.orders.filter(o=>o.stage===7).length;

  const analyticsHTML=`<div class="cs"><div class="cs-title" style="margin-bottom:10px">📊 Аналитика клиента</div>
    <div class="anal-grid">
      <div class="anal-card"><div class="anal-l">Всего заказов</div><div class="anal-v">${c.orders.length}</div><div class="anal-s">${completedOrders.length} завершено</div></div>
      <div class="anal-card"><div class="anal-l">В пути сейчас</div><div class="anal-v">${inWay}</div><div class="anal-s">${activeOrders.length} активных</div></div>
      <div class="anal-card"><div class="anal-l">Отправлено кг</div><div style="display:flex;align-items:baseline;justify-content:space-between"><div class="anal-v">${totalWeightSent.toFixed(1)}</div><div class="anal-s">кг всего</div></div></div>
      <div class="anal-card" style="grid-column:1/-1">
        <div class="anal-l" style="margin-bottom:10px">Итоговая прибыль</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div style="background:var(--s2);border-radius:var(--rs);padding:11px 13px">
            <div style="font-size:11px;color:var(--t2);margin-bottom:4px">🇨🇳 Выкуп товара (₽)</div>
            <div style="font-size:20px;font-weight:700;color:var(--gt)">${fmtR(totalProfitGoods)}</div>
            <div style="margin-top:7px;display:flex;flex-direction:column;gap:3px">
              <div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--t2)">Накрутка</span><span style="font-weight:600">${fmtR(totalMarkup)}</span></div>
              <div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--t2)">Курс</span><span style="font-weight:600">${fmtR(totalFxProfit)}</span></div>
              <div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--t2)">Комиссия</span><span style="font-weight:600">${fmtR(totalCommRub)}</span></div>
            </div>
          </div>
          <div style="background:var(--s2);border-radius:var(--rs);padding:11px 13px">
            <div style="font-size:11px;color:var(--t2);margin-bottom:4px">🚚 Доставка ($)</div>
            <div style="font-size:20px;font-weight:700;color:var(--gt)">${fmtD(profitDel)}</div>
            <div style="margin-top:7px;display:flex;flex-direction:column;gap:3px">
              <div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--t2)">Выручка</span><span style="font-weight:600">${fmtD(totalDelRevDollar)}</span></div>
              <div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--t2)">Себес</span><span style="font-weight:600;color:var(--rd)">− ${fmtD(totalDelCostDollar)}</span></div>
              <div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--t2)">Вес</span><span style="font-weight:600">${totalWeightSent.toFixed(1)} кг</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div style="margin-top:9px;display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:.5px solid var(--bd)">
      <span style="font-size:13px;color:var(--t2)">Дата последнего заказа</span>
      <span style="font-size:13px;font-weight:500">${lastOrderDate?fmtDate(lastOrderDate):'—'}</span>
    </div>
  </div>`;

  const cH=c.comments.map(cm=>`<div class="comment"><div class="cav">Я</div><div style="flex:1"><div class="cmeta">${tsLbl(cm.ts)}</div><div class="ctext">${cm.text}</div></div></div>`).join('')||`<div style="font-size:13px;color:var(--t3)">Нет комментариев</div>`;
  document.getElementById('client-content').innerHTML=`
    <div class="card"><div class="cs"><div class="cs-hd"><div class="cs-title">Контакт</div><button class="pb pb-s pb-sm" onclick="openECC(${c.id})">✏️ Изменить</button></div>
      <div class="fr"><span class="fl">ID</span><span class="fv">${c.clientId}</span></div>
      <div class="fr"><span class="fl">Имя</span><span class="fv">${c.name}</span></div>
      <div class="fr"><span class="fl">Телефон</span><span class="fv" style="color:var(--ac)">${c.phone}</span></div>
      ${c.username?`<div class="fr"><span class="fl">Ник</span><span class="fv" style="color:var(--ac)">${c.username}</span></div>`:''}
      <div class="fr"><span class="fl">Мессенджер</span><span class="fv">${c.messenger}</span></div>
      <div class="fr"><span class="fl">Товар</span><span class="fv">${c.product}</span></div>
      <div class="fr"><span class="fl">Доставка</span><span class="fv">${c.delivery==='cargo'?'Карго':'Белая'}</span></div>
    ${analyticsHTML}</div></div>
    <div class="card"><div class="cs"><div class="cs-title" style="margin-bottom:9px">Заказы (${c.orders.length})</div>
      ${c.orders.length?c.orders.map(o=>{const diff=o.delivery.arrDate?daysDiff(o.delivery.arrDate):null;const isD=diff!==null&&diff<0&&o.stage===7;return`<div class="cr" onclick="openOrder(${c.id},${o.id})"><div style="flex:1"><div style="font-size:14px;font-weight:500">${o.name}</div>${o.delivery.arrDate&&o.stage>=7?`<div style="font-size:12px;color:${isD?'var(--rd)':o.stage===9?'var(--gt)':'var(--ac)'};margin-top:2px">📦 ${fmtDate(o.delivery.arrDate)}${isD?' ⚠️':o.stage===9?' ✅':''}</div>`:''}</div><span style="font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:${sb[o.stage]};color:${sc[o.stage]};white-space:nowrap">${OS[o.stage]}</span>›</div>`;}).join(''):'<div class="empty" style="padding:14px">Нет заказов</div>'}
    </div></div>
    <div class="card"><div class="cs"><div class="cs-title" style="margin-bottom:9px">Комментарии</div>
      <div>${cH}</div>
      <div class="cinput"><textarea id="cc-i" placeholder="Комментарий..." onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter'){event.preventDefault();addCC();}"></textarea><button class="pb pb-p pb-sm" onclick="addCC()">→</button></div>
    </div></div>`;
}
function openECC(id){const c=db.work.clients.find(x=>x.id===id);showModal(`<h3>Редактировать контакт</h3><div class="fg"><label>ID</label><input id="ec-id" value="${c.clientId}"></div><div class="fg"><label>Имя</label><input id="ec-n" value="${c.name}"></div><div class="fg2"><div class="fg"><label>Телефон</label><input id="ec-p" value="${c.phone}"></div><div class="fg"><label>Ник (username)</label><input id="ec-u" value="${c.username||''}"></div></div><div class="fg2"><div class="fg"><label>Мессенджер</label><select id="ec-m">${['Telegram','WhatsApp','Viber','Другое'].map(s=>`<option${c.messenger===s?' selected':''}>${s}</option>`).join('')}</select></div><div class="fg"><label>Доставка</label><select id="ec-d"><option value="cargo"${c.delivery==='cargo'?' selected':''}>Карго</option><option value="white"${c.delivery==='white'?' selected':''}>Белая</option></select></div></div><div class="fg"><label>Товар</label><input id="ec-pr" value="${c.product}"></div><div class="mact"><button class="pb pb-s" onclick="closeModal()">Отмена</button><button class="pb pb-p" onclick="saveECC(${id})">Сохранить</button></div>`);}
function saveECC(id){const c=db.work.clients.find(x=>x.id===id);c.clientId=document.getElementById('ec-id').value||c.clientId;c.name=document.getElementById('ec-n').value;c.phone=document.getElementById('ec-p').value;c.username=document.getElementById('ec-u').value;c.messenger=document.getElementById('ec-m').value;c.delivery=document.getElementById('ec-d').value;c.product=document.getElementById('ec-pr').value;closeModal();renderClient();document.getElementById('client-title').textContent=c.name;saveDB();showToast('Сохранено');}
function addCC(){const txt=document.getElementById('cc-i').value.trim();if(!txt)return;db.work.clients.find(x=>x.id===curClient).comments.push({text:txt,ts:Date.now()});renderClient();showToast('Комментарий добавлен');}

// ── ORDER ──────────────────────────────────────────────
function openOrder(cid,oid){curClient=cid;curOrder=oid;const c=db.work.clients.find(x=>x.id===cid),o=c.orders.find(x=>x.id===oid);document.getElementById('order-title').textContent=o.name;document.getElementById('order-back').onclick=()=>openClient(cid);renderOrder();showScreen('s-order');}
function calcP(p){const rev=(+p.priceY||0)*(+p.rateOut||0),cost=(+p.costY||0)*(+p.rateIn||0),comm=rev*(+p.comm||0)/100;return{rev,cost,comm,profit:rev-cost+comm};}
function calcD(d){const price=(+d.rateOut||0)*(+d.weight||0),cost=(+d.rateIn||0)*(+d.weight||0);return{price,cost,profit:price-cost};}
function renderOrder(){
  const c=db.work.clients.find(x=>x.id===curClient),o=c.orders.find(x=>x.id===curOrder);
  setTimeout(()=>{initOrderPhotoUpload();initPhotoDrag();},80);
  const p=o.payment,d=o.delivery,cp=calcP(p),cd=calcD(d);
  const dL=d.arrDate?daysDiff(d.arrDate):null,isD=dL!==null&&dL<0;
  const hasP=p.costY&&p.priceY&&p.rateIn&&p.rateOut,hasD=d.rateIn&&d.rateOut&&d.weight;
  const stH=`<div class="sb">${OS.map((s,i)=>`<div class="ss${o.stage===i?' sact':i<o.stage?' sdone':''}" onclick="setOS(${c.id},${o.id},${i})" style="font-size:9px">${s}</div>`).join('')}</div>`;
  const cH=o.comments.map(cm=>`<div class="comment"><div class="cav">Я</div><div style="flex:1"><div class="cmeta">${tsLbl(cm.ts)}</div><div class="ctext">${cm.text}</div></div></div>`).join('')||`<div style="font-size:13px;color:var(--t3)">Нет комментариев</div>`;
  document.getElementById('order-content').innerHTML=`
    <div class="card">
      <div class="cs"><div class="cs-title" style="margin-bottom:9px">Этап</div>${stH}</div>
      ${o.stage>=3?`<div class="cs"><div class="cs-title" style="margin-bottom:9px">Оплата</div>
        <div class="pg"><div class="pi"><div class="pl">Себестоимость ¥</div><div class="pv">${fmtY(p.costY||0)}</div><div class="ps">= ${fmtR((+p.costY||0)*(+p.rateIn||0))}</div></div><div class="pi"><div class="pl">Сумма клиенту ¥</div><div class="pv">${fmtY(p.priceY||0)}</div><div class="ps">= ${fmtR((+p.priceY||0)*(+p.rateOut||0))}</div></div></div>
        <div class="pg"><div class="pi"><div class="pl">Курс ¥ (себес)</div><div class="pv">${p.rateIn||'—'}</div></div><div class="pi"><div class="pl">Курс ¥ (клиент)</div><div class="pv">${p.rateOut||'—'}</div></div></div>
        <div class="pg"><div class="pi"><div class="pl">Комиссия</div><div class="pv">${p.comm||0}%</div><div class="ps">= ${fmtR(cp.comm)}</div></div><div class="pi"><div class="pl">КП</div><div class="pv">${p.kp?`<a href="${p.kp}" style="color:var(--ac);font-size:13px">🔗</a>`:'—'}</div></div></div>
        <div class="drow"><span class="dl">📅 Дата оплаты</span><span class="dv">${p.date?fmtDate(p.date):'—'}</span></div>
        ${hasP?`<div style="margin-top:9px"><div style="background:var(--gbg);border:.5px solid rgba(52,199,89,.3);border-radius:var(--rs);padding:11px 13px;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><span style="font-size:13px;color:var(--gt);font-weight:500">Прибыль с товара</span><span style="font-size:17px;font-weight:700;color:var(--gt)">${fmtR(cp.profit)}</span></div><div class="bk"><div class="br"><span class="brl">Выручка</span><span class="brv gv">${fmtR(cp.rev)}</span></div><div class="br"><span class="brl">Себес</span><span class="brv rv">− ${fmtR(cp.cost)}</span></div><div class="br"><span class="brl">Комиссия</span><span class="brv gv">+ ${fmtR(cp.comm)}</span></div></div></div>`:''}
        ${(()=>{
          const paid=+p.paidAmt||0;
          const due=((+p.priceY||0)*(+p.rateOut||0));
          if(!due)return'';
          const diff=paid-due;
          const isPaid=Math.abs(diff)<1;
          const isOver=diff>1;
          const isUnder=diff<-1;
          const bg=isPaid?'var(--gbg)':isOver?'rgba(0,122,255,.1)':'var(--rbg)';
          const bc=isPaid?'rgba(52,199,89,.3)':isOver?'rgba(0,122,255,.3)':'rgba(255,59,48,.3)';
          const label=isPaid?'✅ Оплачено полностью':isOver?`💙 Переплата клиента: +${fmtR(diff)}`:`⚠️ Долг клиента: ${fmtR(Math.abs(diff))}`;
          const color=isPaid?'var(--gt)':isOver?'#0a84ff':'var(--rd)';
          const payNote=o.stage>=8?'<div style="font-size:11px;color:var(--t2);margin-top:4px">💡 Выплата вам — после получения груза клиентом</div>':'<div style="font-size:11px;color:var(--t3);margin-top:4px">⏳ Выплата вам — когда клиент получит груз</div>';
          return`<div style="background:${bg};border:.5px solid ${bc};border-radius:var(--rs);padding:11px 13px;margin-top:9px">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:13px;font-weight:600;color:${color}">${label}</span>
              <button class="pb pb-s pb-sm" style="font-size:11px" onclick="openPayStatus()">✏️ Изменить</button>
            </div>
            <div style="font-size:12px;color:var(--t2);margin-top:5px;display:flex;gap:12px">
              <span>К оплате: <b style="color:var(--t1)">${fmtR(due)}</b></span>
              <span>Оплачено: <b style="color:${paid>=due?'var(--gt)':'var(--rd)'}">${fmtR(paid)}</b></span>
            </div>
            ${payNote}
          </div>`;
        })()}
        <button class="pb pb-s pb-sm" style="margin-top:9px" onclick="openEP()">✏️ Заполнить / изменить</button>
      </div>`:''}
      ${o.stage>=6?`<div class="cs"><div class="cs-title" style="margin-bottom:9px">Упаковка и отправка</div>
        <div class="pg"><div class="pi"><div class="pl">Себес за кг $</div><div class="pv">${d.rateIn?fmtD(d.rateIn):'—'}</div><div class="ps">${d.rateIn&&d.weight?'Итого: '+fmtD((+d.rateIn)*(+d.weight)):''}</div></div><div class="pi"><div class="pl">Цена клиенту за кг $</div><div class="pv">${d.rateOut?fmtD(d.rateOut):'—'}</div><div class="ps">${d.rateOut&&d.weight?'Итого: '+fmtD((+d.rateOut)*(+d.weight)):''}</div></div></div>
        <div class="pg"><div class="pi"><div class="pl">Общий вес кг</div><div class="pv">${d.weight?d.weight+' кг':'—'}</div></div><div class="pi"><div class="pl">Сумма доставки $</div><div class="pv" style="color:var(--ac)">${hasD?fmtD(cd.price):'—'}</div><div class="ps">${hasD?'Прибыль: '+fmtD(cd.profit):''}</div></div></div>
        <div class="drow"><span class="dl">✈️ Дата отправки</span><span class="dv">${d.sendDate?fmtDate(d.sendDate):'—'}</span></div>
        <div class="drow"><span class="dl">📦 Ожид. прибытие</span><span class="dv" style="color:${isD?'var(--rd)':'var(--ac)'}">${d.arrDate?fmtDate(d.arrDate):'—'}</span></div>
        <div class="drow"><span class="dl">⏱ Дней в пути</span><span class="dv" style="color:${isD?'var(--rd)':dL===0?'var(--gn)':'inherit'}">${dL===null?'—':isD?'Просрочено '+Math.abs(dL)+' дн.':dL===0?'Сегодня!':'Осталось '+dL+' дн.'}</span></div>
        <div class="drow"><span class="dl">📄 Накладная</span>${d.naklUrl?`<a href="${d.naklUrl}" target="_blank" style="color:var(--ac);font-size:13px">🔗 ${d.naklName||'Открыть'}</a>`:'<span style="color:var(--t3)">Не прикреплена</span>'}</div>
        ${o.stage===7&&isD?`<div style="background:var(--rbg);border:.5px solid rgba(255,59,48,.3);border-radius:var(--rs);padding:11px 13px;margin-top:9px;display:flex;gap:9px"><span>⚠️</span><div><div style="font-weight:600;color:var(--rt)">Доставка задерживается</div><div style="font-size:12px;color:var(--rt);margin-top:2px">Просрочено на ${Math.abs(dL)} дн.</div></div></div>`:o.stage===7&&dL===0?`<div style="background:var(--gbg);border:.5px solid rgba(52,199,89,.3);border-radius:var(--rs);padding:11px 13px;margin-top:9px;display:flex;gap:9px"><span>📦</span><div><div style="font-weight:600;color:var(--gt)">Груз прибывает сегодня!</div></div></div>`:''}
        ${o.stage===0?`<div style="margin-top:10px;background:rgba(175,82,222,.08);border:.5px solid rgba(175,82,222,.3);border-radius:var(--rs);padding:12px 14px">
          <div style="font-size:13px;font-weight:600;color:#bf7fe0;margin-bottom:10px">🔍 Поиск товара — отправить задание ассистенту</div>
          ${o.assistantTaskId?`<div style="font-size:12px;color:var(--t2);margin-bottom:8px">Задание #${o.assistantTaskId} отправлено</div>`:''}
          <button class="pb pb-sm" style="background:rgba(175,82,222,.15);color:#bf7fe0;border:none;font-size:13px;font-weight:600" onclick="openSendToAssistant('order',null)">📤 ${o.assistantTaskId?'Обновить задание':'Отправить ассистенту'}</button>
        </div>`:''}
        ${o.stage===2?`<div style="margin-top:10px;background:rgba(0,122,255,.08);border:.5px solid rgba(0,122,255,.25);border-radius:var(--rs);padding:12px 14px">
          <div style="font-size:13px;font-weight:600;color:var(--ac);margin-bottom:8px">📋 КП готово — ссылка на таблицу</div>

        ${o.stage===7?`<div style="margin-top:10px;background:var(--gbg);border:.5px solid rgba(52,199,89,.3);border-radius:var(--rs);padding:12px 14px">

function initPhotoDrag(){

    });
    el.addEventListener('dragend',()=>{
      el.style.opacity='';
      grid.querySelectorAll('.photo-thumb').forEach(t=>t.style.outline='');
      dragIdx=null;
    });
    el.addEventListener('dragover',e=>{
      e.preventDefault();
      if(dragIdx===null||+el.dataset.idx===dragIdx)return;
      grid.querySelectorAll('.photo-thumb').forEach(t=>t.style.outline='');
      el.style.outline='2px solid var(--ac)';
    });
    el.addEventListener('drop',e=>{

      const toIdx=+el.dataset.idx;
      if(dragIdx===null||dragIdx===toIdx)return;
      const o=db.work.clients.find(x=>x.id===curClient)?.orders.find(x=>x.id===curOrder);
      if(!o||!o.photos)return;
      const [moved]=o.photos.splice(dragIdx,1);

      saveDB();renderOrder();
    });
    // Touch drag
    let touchDragIdx=null,touchOver=null;
    el.addEventListener('touchstart',()=>{touchDragIdx=+el.dataset.idx;el.style.opacity='.4';},{passive:true});
    el.addEventListener('touchmove',e=>{
      const t=e.touches[0];
      const under=document.elementFromPoint(t.clientX,t.clientY)?.closest('.photo-thumb');
      if(touchOver)touchOver.style.outline='';
      if(under&&+under.dataset.idx!==touchDragIdx){touchOver=under;under.style.outline='2px solid var(--ac)';}
    },{passive:true});
    el.addEventListener('touchend',()=>{
      el.style.opacity='';
      if(touchOver){
        touchOver.style.outline='';
        const toIdx=+touchOver.dataset.idx;
        if(touchDragIdx!==null&&touchDragIdx!==toIdx){
          const o=db.work.clients.find(x=>x.id===curClient)?.orders.find(x=>x.id===curOrder);
          if(o&&o.photos){const [m]=o.photos.splice(touchDragIdx,1);o.photos.splice(toIdx,0,m);saveDB();renderOrder();}
        }
      }
      touchDragIdx=null;touchOver=null;
    });
  });
}

function addLeadTask(){

  if(date&&time){

function scheduleNotification(text,leadName,ms){
  if(!('Notification' in window))return;
  Notification.requestPermission().then(perm=>{
    if(perm==='granted'){
      setTimeout(()=>{
        new Notification(`📋 Задача: ${leadName}`,{body:text,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📋</text></svg>'});
      },ms);
    }
  });
}

function checkLeadTaskReminders(){

  db.work.leads.forEach(l=>{

    l.tasks.forEach(t=>{
      if(t.done||!t.date)return;
      const dt=new Date(t.date+'T'+(t.time||'09:00'));
      const diff=dt-now;
      // Schedule if in the future (within 24h)
      if(diff>0&&diff<86400000){
        scheduleNotification(t.text,l.name,diff);
      }
    });
  });
}

function triggerCallUpload(){
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept='audio/*,.mp3,.wav,.m4a,.ogg,.webm,.mp4';
  inp.style.display='none';
  document.body.appendChild(inp);
  inp.addEventListener('change',async e=>{
    const file=e.target.files[0];
    document.body.removeChild(inp);
    if(!file)return;
    const status=document.getElementById('call-upload-status');
    const l=db.work.leads.find(x=>x.id===curLead);
    if(!l)return;
    if(file.size>25*1024*1024){showToast('❌ Файл слишком большой (макс 25 МБ)');return;}
    if(status)status.style.display='block';
    if(status)status.textContent='⏳ Загружаю файл...';
    try{
      // Step 1: Upload audio to Cloudinary for playback
      if(status)status.textContent='⬆️ Загружаю аудио...';
      let audioUrl='';
      try{
        const fd=new FormData();
        fd.append('file',file);
        fd.append('upload_preset',CLD_PRESET);
        fd.append('folder','crm-calls');
        fd.append('resource_type','auto');
        const cldResp=await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/auto/upload`,{method:'POST',body:fd});
        const cldData=await cldResp.json();
        audioUrl=cldData.secure_url||'';
      }catch(e){console.warn('Cloudinary upload failed:',e);}

      // Step 2: Transcribe with OpenAI
      if(status)status.textContent='🎙 Расшифровываю звонок (~30 сек)...';
      const base64=await new Promise((res,rej)=>{
        const reader=new FileReader();
        reader.onload=()=>res(reader.result.split(',')[1]);
        reader.onerror=rej;
        reader.readAsDataURL(file);
      });
      const resp=await fetch('/.netlify/functions/transcribe',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({audioBase64:base64,mimeType:file.type,fileName:file.name,leadName:l.name})
      });
      const data=await resp.json();
      if(data.error)throw new Error(data.error);
      if(!l.calls)l.calls=[];
      l.calls.push({ts:Date.now(),transcript:data.transcript,summary:data.summary,audioUrl});
      saveDB();
      if(status)status.style.display='none';
      renderLead();
      showToast('✅ Звонок расшифрован и сохранён!');
    }catch(err){
      if(status)status.style.display='none';
      showToast('❌ Ошибка: '+err.message);
      console.error(err);
    }
  });
  inp.click();
}

// ── EXCEL EXPORT ───────────────────────────────────────
function exportExcel(){
  const rows=[['Клиент','ID','Товар','Доставка','Заказов','Выручка ₽','Прибыль ₽','В пути','Завершено']];
  db.work.clients.forEach(c=>{
    const rev=c.orders.reduce((s,o)=>s+(+o.payment.priceY||0)*(+o.payment.rateOut||0),0);
    const profit=c.orders.reduce((s,o)=>{const markup=((+o.payment.priceY||0)-(+o.payment.costY||0))*(+o.payment.rateIn||0);const fx=(+o.payment.priceY||0)*((+o.payment.rateOut||0)-(+o.payment.rateIn||0));const comm=(+o.payment.priceY||0)*(+o.payment.rateOut||0)*(+o.payment.comm||0)/100;return s+markup+fx+comm;},0);
    rows.push([c.name,c.clientId,c.product,c.delivery==='cargo'?'Карго':'Белая',c.orders.length,Math.round(rev),Math.round(profit),c.orders.filter(o=>o.stage===7).length,c.orders.filter(o=>o.stage===9).length]);
  });
  const orderRows=[['','ЗАКАЗЫ','','','','','','','']];
  orderRows.push(['Клиент','Заказ','Этап','Себес ¥','Цена ¥','Курс вх.','Курс исх.','Комис %','Дата оплаты']);
  db.work.clients.forEach(c=>{
    c.orders.forEach(o=>{
      orderRows.push([c.name,o.name,OS[o.stage],o.payment.costY||0,o.payment.priceY||0,o.payment.rateIn||0,o.payment.rateOut||0,o.payment.comm||0,o.payment.date||'']);
    });
  });
  const leadRows=[['','ЛИДЫ','','','','','','','']];
  leadRows.push(['Имя','Источник','Стадия','Товар','Доставка','Комментариев','','','']);
  db.work.leads.forEach(l=>{
    leadRows.push([l.name,l.source||'',LS[l.stage]||'',l.product||'',l.delivery||'',l.comments.length,'','','']);
  });
  const all=[...rows,...orderRows,...leadRows];
  const csv=all.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const bom='﻿';
  const blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  const d=new Date();a.download=`CRM_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.csv`;
  a.click();showToast('📊 Экспорт готов!');
}

// ── SEARCH ─────────────────────────────────────────────
function runSearch(q){
  const box=document.getElementById('search-results');
  if(!q.trim()){box.style.display='none';return;}
  const ql=q.toLowerCase();
  const results=[];
  // Clients
  db.work.clients.forEach(c=>{
    if(c.name.toLowerCase().includes(ql)||c.clientId.toLowerCase().includes(ql)||c.product.toLowerCase().includes(ql)){
      results.push({type:'client',icon:'👥',label:c.name,sub:c.clientId+' · '+c.product,action:`openClient(${c.id})`});
    }
    // Orders
    c.orders.forEach(o=>{
      if(o.name.toLowerCase().includes(ql)){
        results.push({type:'order',icon:'📦',label:o.name,sub:'Заказ у '+c.name+' · '+OS[o.stage],action:`openOrder(${c.id},${o.id})`});
      }
    });
  });
  // Leads
  db.work.leads.forEach(l=>{
    if(l.name.toLowerCase().includes(ql)||(l.source||'').toLowerCase().includes(ql)||(l.product||'').toLowerCase().includes(ql)){
      results.push({type:'lead',icon:'🎯',label:l.name,sub:LS[l.stage]+(l.source?' · '+l.source:''),action:`openLead(${l.id})`});
    }
  });
  if(!results.length){box.innerHTML='<div class="card" style="padding:12px 14px;font-size:13px;color:var(--t3)">Ничего не найдено</div>';box.style.display='block';return;}
  box.innerHTML='<div class="card">'+results.slice(0,8).map(r=>`<div class="cr" onclick="${r.action};document.getElementById('crm-search').value='';document.getElementById('search-results').style.display='none'"><div class="av" style="background:var(--s3);color:var(--t2)">${r.icon}</div><div style="flex:1"><div style="font-size:14px;font-weight:500">${r.label}</div><div style="font-size:12px;color:var(--t2);margin-top:1px">${r.sub}</div></div>›</div>`).join('')+'</div>';
  box.style.display='block';
}

  setTimeout(()=>{
    const overdue=db.work.leads.filter(l=>l.stage===6&&l.kpSentAt&&(Date.now()-l.kpSentAt)>=86400000);
